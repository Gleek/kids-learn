<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Rocket!</title>
<style>
  @font-face {
    font-family: "Uthmanic";
    src: url("https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8f4fd;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(500px, 100vw - 20px);
    text-align: center;
    direction: ltr;
  }

  /* ── HUD ── */
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #ffffff;
    border-radius: 16px 16px 0 0;
    border: 3px solid #c5d3f7;
    border-bottom: none;
  }

  #round-label {
    font-size: 18px;
    color: #636e72;
    font-weight: 600;
  }

  #stars { display: flex; gap: 6px; }

  .star {
    font-size: 28px;
    transition: all 0.3s;
  }
  .star.earned { filter: drop-shadow(0 0 6px gold); }

  /* ── Game Area ── */
  #game-area {
    background: linear-gradient(180deg, #b3e0ff 0%, #e8f4fd 100%);
    border: 3px solid #c5d3f7;
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 20px 20px 30px;
    position: relative;
    overflow: hidden;
  }

  #game-area::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(1px 1px at 20% 15%, white, transparent),
                radial-gradient(1px 1px at 60% 25%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(1px 1px at 10% 40%, white, transparent),
                radial-gradient(1px 1px at 45% 5%, white, transparent),
                radial-gradient(1px 1px at 90% 35%, white, transparent),
                radial-gradient(1.5px 1.5px at 30% 50%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 70% 45%, white, transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Arabic Word Display ── */
  #word-display {
    font-size: 72px;
    font-weight: 700;
    color: #2d3436;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
    direction: rtl;
    font-family: "Uthmanic", "Traditional Arabic", "Scheherazade New", "Amiri", "Noto Naskh Arabic", serif;
    line-height: 1.4;
  }

  #word-hint {
    font-size: 14px;
    color: #636e72;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
    min-height: 20px;
  }

  /* ── Vehicle Area ── */
  #vehicle-area {
    position: relative;
    margin: 0 auto 20px;
    z-index: 1;
  }

  /* ── Sound Buttons ── */
  #sound-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    max-width: 360px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .sound-btn {
    padding: 14px 8px;
    border-radius: 16px;
    border: 4px solid #c5d3f7;
    background: #f0f4ff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    min-height: 80px;
  }

  .sound-btn:hover {
    transform: scale(1.05);
    border-color: #ff6b8a;
    background: #fff0f3;
  }
  .sound-btn:active { transform: scale(0.95); }

  .sound-btn .speaker { font-size: 28px; }
  .sound-btn .label {
    font-size: 13px;
    color: #636e72;
    font-weight: 600;
  }

  .sound-btn.playing {
    border-color: #4a90d9;
    background: #e8f0ff;
    animation: pulse 0.6s ease-in-out;
  }

  .sound-btn.correct {
    border-color: #4caf50;
    background: #e8f5e9;
    animation: pop 0.4s;
  }
  .sound-btn.wrong {
    border-color: #ff6b8a;
    background: #fce4ec;
    animation: shake 0.4s;
  }
  .sound-btn.selected {
    border-color: #ff6b8a;
    background: #fff0f3;
    box-shadow: 0 0 0 3px rgba(255, 107, 138, 0.3);
  }

  .sound-btn.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  /* ── Submit Button ── */
  #submit-wrap {
    position: relative;
    z-index: 1;
    margin-top: 14px;
    min-height: 56px;
  }

  #submit-btn {
    font-size: 22px;
    padding: 12px 48px;
    border: none;
    border-radius: 50px;
    background: #4caf50;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s, opacity 0.3s;
    opacity: 0;
    pointer-events: none;
  }

  #submit-btn.visible {
    opacity: 1;
    pointer-events: auto;
    animation: pop 0.3s;
  }

  #submit-btn:hover { background: #43a047; transform: scale(1.05); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ── Overlays ── */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(240, 244, 255, 0.97);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 20;
  }

  .overlay h1 {
    font-size: 42px;
    color: #ff6b8a;
    margin-bottom: 16px;
  }

  .overlay p {
    font-size: 22px;
    color: #2d3436;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
    padding: 0 20px;
  }

  .overlay .final-stars {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .btn {
    font-size: 28px;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    background: #ff6b8a;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }
  .btn:hover { background: #e8527a; transform: scale(1.05); }

  /* ── Level Selector ── */
  #level-select {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    padding: 0 24px;
    margin-bottom: 20px;
  }

  .level-btn {
    padding: 16px 20px;
    border: 3px solid #c5d3f7;
    border-radius: 14px;
    background: #ffffff;
    cursor: pointer;
    text-align: left;
    transition: transform 0.15s, border-color 0.2s, background 0.2s;
  }

  .level-btn:hover {
    transform: scale(1.02);
    border-color: #ff6b8a;
    background: #fff0f3;
  }

  .level-btn .level-name {
    font-size: 20px;
    font-weight: 700;
    color: #2d3436;
    margin-bottom: 4px;
  }

  .level-btn .level-desc {
    font-size: 13px;
    color: #636e72;
  }

  .level-btn .level-num {
    font-size: 14px;
    font-weight: 600;
    color: #ff6b8a;
    margin-bottom: 2px;
  }

  .level-btn.locked {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }

  .feedback-float {
    position: absolute;
    font-size: 56px;
    z-index: 15;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  @media (max-width: 500px) {
    #word-display { font-size: 56px; }
    .sound-btn { min-height: 68px; padding: 10px 6px; }
    .sound-btn .speaker { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="round-label">Round 1 / 5</div>
    <div id="stars"></div>
  </div>
  <div id="game-area">
    <div id="word-display"></div>
    <div id="word-hint"></div>

    <div id="vehicle-area"></div>

    <div id="sound-grid"></div>
    <div id="submit-wrap"><button id="submit-btn">Submit</button></div>
  </div>

  <!-- Level Select Screen -->
  <div class="overlay" id="start-screen">
    <h1>Arabic Rocket!</h1>
    <p>Read the word. Pick the<br>correct sound to build your rocket!</p>
    <div id="level-select"></div>
  </div>

  <!-- End Screen -->
  <div class="overlay" id="end-screen" style="display:none;">
    <h1 id="end-title">Great Job!</h1>
    <div class="final-stars" id="final-stars"></div>
    <p id="end-message"></p>
    <button class="btn" id="restart-btn">Play Again</button>
    <button class="btn" id="change-level-btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;font-size:20px;padding:10px 36px;">Change Level</button>
    <a href="index.html" class="btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;text-decoration:none;display:inline-block;text-align:center;font-size:20px;padding:10px 36px;">Home</a>
  </div>
</div>

<script src="shared/arabic-data.js"></script>
<script src="shared/game.js"></script>
<script src="shared/builder.js"></script>
<script>
const ROUNDS = 5;
const NUM_CHOICES = 4;

const wordDisplay = document.getElementById("word-display");
const wordHint = document.getElementById("word-hint");
const soundGrid = document.getElementById("sound-grid");
const starsEl = document.getElementById("stars");
const roundLabel = document.getElementById("round-label");
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const wrapper = document.getElementById("game-wrapper");
const vehicleArea = document.getElementById("vehicle-area");
const levelSelect = document.getElementById("level-select");

let currentRound = 0;
let starsEarned = 0;
let sessionWords = [];
let currentLevel = null;
let locked = false;
const playWordAudio = KidsGame.createWordAudioPlayer({ getAudioURL: ArabicData.getAudioURL });

// ── Stars ──

function renderStars() {
  KidsGame.renderStars(starsEl, starsEarned, ROUNDS);
}

// ── Level Selector ──

function buildLevelSelector() {
  KidsGame.renderLevelSelector(levelSelect, ArabicData.LEVELS, startGame, { startNumber: 2 });
}

// ── Game Logic ──

function pickSessionWords(levelKey) {
  const words = ArabicData.LEVELS[levelKey].words;
  return KidsGame.pickRandom(words, ROUNDS);
}

function pickDistractors(correctWord, levelKey) {
  const allWords = ArabicData.LEVELS[levelKey].words;
  return KidsGame.pickDistractors(allWords, correctWord, NUM_CHOICES - 1, {
    getKey: w => w.text,
    filter: (word) => levelKey !== "level2" || word.transliteration.slice(-1) === correctWord.transliteration.slice(-1),
  });
}

let selectedChoice = null;
let selectedBtn = null;
const submitBtn = document.getElementById("submit-btn");

function setupRound() {
  const word = sessionWords[currentRound];
  wordDisplay.textContent = word.text;
  wordDisplay.style.fontSize = (currentLevel === "level2") ? "96px" : "";
  wordHint.textContent = "";
  roundLabel.textContent = "Round " + (currentRound + 1) + " / " + ROUNDS;

  const distractors = pickDistractors(word, currentLevel);
  const choices = KidsGame.shuffle([word, ...distractors]);

  soundGrid.innerHTML = "";
  locked = false;
  selectedChoice = null;
  selectedBtn = null;
  submitBtn.classList.remove("visible");

  choices.forEach((choice) => {
    const btn = document.createElement("button");
    btn.className = "sound-btn";
    btn.innerHTML = '<span class="speaker">🔊</span><span class="label">' + choice.transliteration + '</span>';

    btn.addEventListener("click", () => {
      if (locked) return;

      // Deselect previous
      document.querySelectorAll(".sound-btn.selected").forEach(b => b.classList.remove("selected"));

      // Select this one
      btn.classList.add("selected");
      selectedChoice = choice;
      selectedBtn = btn;

      // Show submit button
      submitBtn.classList.add("visible");

      // Play audio preview
      btn.classList.remove("playing");
      void btn.offsetWidth;
      btn.classList.add("playing");
      setTimeout(() => btn.classList.remove("playing"), 800);

      playWordAudio(choice);
    });

    soundGrid.appendChild(btn);
  });
}

submitBtn.addEventListener("click", () => {
  if (locked || !selectedChoice || !selectedBtn) return;
  const word = sessionWords[currentRound];
  handlePick(selectedBtn, selectedChoice, word);
});

function handlePick(btn, picked, correct) {
  if (locked) return;

  if (picked.text === correct.text) {
    locked = true;
    btn.classList.add("correct");
    starsEarned = Math.min(ROUNDS, starsEarned + 1);
    KidsGame.playTone(true);
    renderStars();
    Builder.addPart();
    KidsGame.showFeedback("\u2B50", btn, wrapper, 800);
    wordHint.textContent = correct.translation;
    submitBtn.classList.remove("visible");

    document.querySelectorAll(".sound-btn").forEach(b => b.classList.add("disabled"));

    // Play correct audio one more time, then advance
    setTimeout(() => {
      playWordAudio(correct).then(() => {
        setTimeout(() => {
          currentRound++;
          if (currentRound >= ROUNDS) {
            launchRocket();
          } else {
            setupRound();
          }
        }, 400);
      });
    }, 500);
  } else {
    btn.classList.add("wrong");
    starsEarned = Math.max(0, starsEarned - 1);
    KidsGame.playTone(false);
    renderStars();
    KidsGame.showFeedback("\u274C", btn, wrapper, 800);
    btn.classList.add("disabled");
    selectedChoice = null;
    selectedBtn = null;
    submitBtn.classList.remove("visible");
  }
}

// ── Launch (via Builder) ──

function launchRocket() {
  soundGrid.style.visibility = "hidden";
  wordDisplay.style.visibility = "hidden";
  wordHint.style.visibility = "hidden";
  submitBtn.classList.remove("visible");

  Builder.celebrate(() => endGame());
}

// ── End Game ──

function endGame() {
  KidsGame.showEndScreen({
    screenEl: endScreen,
    titleEl: document.getElementById("end-title"),
    messageEl: document.getElementById("end-message"),
    finalStarsEl: document.getElementById("final-stars"),
    earned: starsEarned,
    total: ROUNDS,
    reward: { enabled: false },
    messages: {
      perfect: { title: "Perfect Launch!", message: "You read all the words correctly!" },
      good: { title: "Great Job!", message: "Your rocket took off! Keep practicing!" },
      try: { title: "Good Try!", message: "Play again to build a bigger rocket!" },
    },
  });
}

// ── Start / Restart ──

function startGame(levelKey) {
  currentLevel = levelKey;
  startScreen.style.display = "none";
  endScreen.style.display = "none";
  soundGrid.style.visibility = "visible";
  wordDisplay.style.visibility = "visible";
  wordHint.style.visibility = "visible";
  starsEarned = 0;
  currentRound = 0;
  sessionWords = pickSessionWords(levelKey);
  Builder.init(vehicleArea, 'random');
  renderStars();
  setupRound();
}

function showLevelSelect() {
  endScreen.style.display = "none";
  startScreen.style.display = "flex";
}

document.getElementById("restart-btn").addEventListener("click", () => startGame(currentLevel));
document.getElementById("change-level-btn").addEventListener("click", showLevelSelect);

// ── Init ──
// Preload voices (needed for Arabic TTS)
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = function () { speechSynthesis.getVoices(); };
}
speechSynthesis.getVoices();

buildLevelSelector();
renderStars();
</script>

</body>
</html>
