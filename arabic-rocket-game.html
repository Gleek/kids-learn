<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Rocket!</title>
<style>
  @font-face {
    font-family: "Uthmanic";
    src: url("https://cdn.jsdelivr.net/gh/thetruetruth/quran-data-kfgqpc@main/hafs/font/hafs.18.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8f4fd;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(500px, 100vw - 20px);
    text-align: center;
    direction: ltr;
  }

  /* ── HUD ── */
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #ffffff;
    border-radius: 16px 16px 0 0;
    border: 3px solid #c5d3f7;
    border-bottom: none;
  }

  #round-label {
    font-size: 18px;
    color: #636e72;
    font-weight: 600;
  }

  #stars { display: flex; gap: 6px; }

  .star {
    font-size: 28px;
    transition: all 0.3s;
  }
  .star.earned { filter: drop-shadow(0 0 6px gold); }

  /* ── Game Area ── */
  #game-area {
    background: linear-gradient(180deg, #b3e0ff 0%, #e8f4fd 100%);
    border: 3px solid #c5d3f7;
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 20px 20px 30px;
    position: relative;
    overflow: hidden;
  }

  #game-area::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(1px 1px at 20% 15%, white, transparent),
                radial-gradient(1px 1px at 60% 25%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(1px 1px at 10% 40%, white, transparent),
                radial-gradient(1px 1px at 45% 5%, white, transparent),
                radial-gradient(1px 1px at 90% 35%, white, transparent),
                radial-gradient(1.5px 1.5px at 30% 50%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 70% 45%, white, transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Arabic Word Display ── */
  #word-display {
    font-size: 72px;
    font-weight: 700;
    color: #2d3436;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
    direction: rtl;
    font-family: "Uthmanic", "Traditional Arabic", "Scheherazade New", "Amiri", "Noto Naskh Arabic", serif;
    line-height: 1.4;
  }

  #word-hint {
    font-size: 14px;
    color: #636e72;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
    min-height: 20px;
  }

  /* ── Rocket ── */
  #rocket-area {
    position: relative;
    height: 240px;
    margin: 0 auto 20px;
    width: 140px;
    z-index: 1;
  }

  .rocket-part {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.5s, transform 0.5s;
    opacity: 0;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  }

  .rocket-part.built {
    opacity: 1;
    animation: partAppear 0.5s ease-out;
  }

  @keyframes partAppear {
    0% { transform: translateX(-50%) scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: translateX(-50%) scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
  }

  #part-engine { bottom: 0; width: 80px; height: 50px; }
  #part-engine .base {
    width: 80px; height: 30px;
    background: #555;
    border-radius: 0 0 10px 10px;
    margin: 0 auto;
  }
  #part-engine .nozzle {
    width: 30px; height: 20px;
    background: #333;
    border-radius: 0 0 8px 8px;
    margin: 0 auto;
  }

  #part-body-lower {
    bottom: 45px; width: 70px; height: 70px;
    background: linear-gradient(135deg, var(--rocket-main), var(--rocket-dark));
    border-radius: 4px;
  }

  #part-body-upper {
    bottom: 110px; width: 70px; height: 70px;
    background: linear-gradient(135deg, var(--rocket-main), var(--rocket-dark));
    border-radius: 4px;
  }

  #part-window {
    bottom: 120px; width: 30px; height: 30px;
    background: radial-gradient(circle at 40% 35%, #a8e6ff, #4a9cc7);
    border: 3px solid #ddd;
    border-radius: 50%;
    z-index: 2;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #window-boy { font-size: 18px; line-height: 1; opacity: 0; }
  #window-boy.visible {
    opacity: 1;
    animation: boyFadeIn 0.8s ease-out forwards, boyWave 0.5s ease-in-out 0.8s 3;
  }

  @keyframes boyFadeIn {
    0% { opacity: 0; transform: scale(0.2); }
    60% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes boyWave {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(12deg); }
  }

  #part-nose {
    bottom: 175px;
    width: 0; height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 60px solid var(--rocket-dark);
    border-radius: 4px;
  }

  #part-body-lower::before, #part-body-lower::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
  }
  #part-body-lower::before {
    left: -18px;
    border-left: 18px solid transparent;
    border-bottom: 40px solid var(--rocket-fin);
  }
  #part-body-lower::after {
    right: -18px;
    border-right: 18px solid transparent;
    border-bottom: 40px solid var(--rocket-fin);
  }

  #flame {
    position: absolute;
    bottom: -80px; left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #flame.active { opacity: 1; animation: flicker 0.15s infinite alternate; }

  @keyframes flicker {
    0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
    100% { transform: translateX(-50%) scaleY(1.15) scaleX(0.9); }
  }

  .flame-outer {
    width: 40px; height: 70px;
    background: linear-gradient(to top, transparent, #ff6600, #ff9900);
    border-radius: 50% 50% 30% 30%;
    position: relative;
  }
  .flame-inner {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 45px;
    background: linear-gradient(to top, transparent, #ffcc00, #fff);
    border-radius: 50% 50% 30% 30%;
  }

  #rocket-area.launching { animation: launch 2.5s ease-in forwards; }

  @keyframes launch {
    0% { transform: translateY(0); }
    10% { transform: translateY(5px); }
    100% { transform: translateY(-800px); }
  }

  .smoke {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,200,200,0.6);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Sound Buttons ── */
  #sound-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    max-width: 360px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .sound-btn {
    padding: 14px 8px;
    border-radius: 16px;
    border: 4px solid #c5d3f7;
    background: #f0f4ff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    min-height: 80px;
  }

  .sound-btn:hover {
    transform: scale(1.05);
    border-color: #ff6b8a;
    background: #fff0f3;
  }
  .sound-btn:active { transform: scale(0.95); }

  .sound-btn .speaker { font-size: 28px; }
  .sound-btn .label {
    font-size: 13px;
    color: #636e72;
    font-weight: 600;
  }

  .sound-btn.playing {
    border-color: #4a90d9;
    background: #e8f0ff;
    animation: pulse 0.6s ease-in-out;
  }

  .sound-btn.correct {
    border-color: #4caf50;
    background: #e8f5e9;
    animation: pop 0.4s;
  }
  .sound-btn.wrong {
    border-color: #ff6b8a;
    background: #fce4ec;
    animation: shake 0.4s;
  }
  .sound-btn.selected {
    border-color: #ff6b8a;
    background: #fff0f3;
    box-shadow: 0 0 0 3px rgba(255, 107, 138, 0.3);
  }

  .sound-btn.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  /* ── Submit Button ── */
  #submit-wrap {
    position: relative;
    z-index: 1;
    margin-top: 14px;
    min-height: 56px;
  }

  #submit-btn {
    font-size: 22px;
    padding: 12px 48px;
    border: none;
    border-radius: 50px;
    background: #4caf50;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s, opacity 0.3s;
    opacity: 0;
    pointer-events: none;
  }

  #submit-btn.visible {
    opacity: 1;
    pointer-events: auto;
    animation: pop 0.3s;
  }

  #submit-btn:hover { background: #43a047; transform: scale(1.05); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ── Overlays ── */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(240, 244, 255, 0.97);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 20;
  }

  .overlay h1 {
    font-size: 42px;
    color: #ff6b8a;
    margin-bottom: 16px;
  }

  .overlay p {
    font-size: 22px;
    color: #2d3436;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
    padding: 0 20px;
  }

  .overlay .final-stars {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .btn {
    font-size: 28px;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    background: #ff6b8a;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }
  .btn:hover { background: #e8527a; transform: scale(1.05); }

  /* ── Level Selector ── */
  #level-select {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    padding: 0 24px;
    margin-bottom: 20px;
  }

  .level-btn {
    padding: 16px 20px;
    border: 3px solid #c5d3f7;
    border-radius: 14px;
    background: #ffffff;
    cursor: pointer;
    text-align: left;
    transition: transform 0.15s, border-color 0.2s, background 0.2s;
  }

  .level-btn:hover {
    transform: scale(1.02);
    border-color: #ff6b8a;
    background: #fff0f3;
  }

  .level-btn .level-name {
    font-size: 20px;
    font-weight: 700;
    color: #2d3436;
    margin-bottom: 4px;
  }

  .level-btn .level-desc {
    font-size: 13px;
    color: #636e72;
  }

  .level-btn .level-num {
    font-size: 14px;
    font-weight: 600;
    color: #ff6b8a;
    margin-bottom: 2px;
  }

  .level-btn.locked {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }

  .feedback-float {
    position: absolute;
    font-size: 56px;
    z-index: 15;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  #launch-msg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    color: #ffd700;
    z-index: 15;
    opacity: 0;
    pointer-events: none;
  }

  #launch-msg.show { animation: launchText 2.5s forwards; }

  @keyframes launchText {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1.3); }
  }

  @media (max-width: 500px) {
    #word-display { font-size: 56px; }
    .sound-btn { min-height: 68px; padding: 10px 6px; }
    .sound-btn .speaker { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="round-label">Round 1 / 5</div>
    <div id="stars"></div>
  </div>
  <div id="game-area">
    <div id="word-display"></div>
    <div id="word-hint"></div>

    <div id="rocket-area">
      <div class="rocket-part" id="part-nose"></div>
      <div class="rocket-part" id="part-window"><span id="window-boy">👦</span></div>
      <div class="rocket-part" id="part-body-upper"></div>
      <div class="rocket-part" id="part-body-lower"></div>
      <div class="rocket-part" id="part-engine">
        <div class="base"></div>
        <div class="nozzle"></div>
      </div>
      <div id="flame">
        <div class="flame-outer">
          <div class="flame-inner"></div>
        </div>
      </div>
    </div>

    <div id="launch-msg">LIFTOFF!</div>

    <div id="sound-grid"></div>
    <div id="submit-wrap"><button id="submit-btn">Submit</button></div>
  </div>

  <!-- Level Select Screen -->
  <div class="overlay" id="start-screen">
    <h1>Arabic Rocket!</h1>
    <p>Read the word. Pick the<br>correct sound to build your rocket!</p>
    <div id="level-select"></div>
  </div>

  <!-- End Screen -->
  <div class="overlay" id="end-screen" style="display:none;">
    <h1 id="end-title">Great Job!</h1>
    <div class="final-stars" id="final-stars"></div>
    <p id="end-message"></p>
    <button class="btn" id="restart-btn">Play Again</button>
    <button class="btn" id="change-level-btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;font-size:20px;padding:10px 36px;">Change Level</button>
    <a href="index.html" class="btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;text-decoration:none;display:inline-block;text-align:center;font-size:20px;padding:10px 36px;">Home</a>
  </div>
</div>

<script src="shared/arabic-data.js"></script>
<script>
const ROUNDS = 5;
const NUM_CHOICES = 4;
const ROCKET_PARTS = ["part-engine", "part-body-lower", "part-body-upper", "part-window", "part-nose"];

const wordDisplay = document.getElementById("word-display");
const wordHint = document.getElementById("word-hint");
const soundGrid = document.getElementById("sound-grid");
const starsEl = document.getElementById("stars");
const roundLabel = document.getElementById("round-label");
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const wrapper = document.getElementById("game-wrapper");
const rocketArea = document.getElementById("rocket-area");
const flame = document.getElementById("flame");
const launchMsg = document.getElementById("launch-msg");
const levelSelect = document.getElementById("level-select");

let currentRound = 0;
let starsEarned = 0;
let partsBuilt = 0;
let sessionWords = [];
let currentLevel = null;
let locked = false;
let currentAudio = null;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── Audio Helpers ──

function playTone(success) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;
  if (success) {
    osc.frequency.value = 523; osc.type = "sine";
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } else {
    osc.frequency.value = 200; osc.type = "square";
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }
}

function playLaunchSound() {
  const noise = audioCtx.createOscillator();
  const noiseGain = audioCtx.createGain();
  noise.type = "sawtooth";
  noise.frequency.value = 80;
  noise.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  noiseGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
  noise.start();
  noise.stop(audioCtx.currentTime + 2.5);

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
  osc.start();
  osc.stop(audioCtx.currentTime + 2.5);
}

function playChime() {
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
    osc.start(t);
    osc.stop(t + 0.5);
  });
}

// ── Arabic TTS ──

function pickArabicVoice() {
  var voices = speechSynthesis.getVoices();
  // Prefer ar-SA, then any Arabic voice
  for (var i = 0; i < voices.length; i++) {
    if (/ar[-_]SA/i.test(voices[i].lang)) return voices[i];
  }
  for (var i = 0; i < voices.length; i++) {
    if (/^ar/i.test(voices[i].lang)) return voices[i];
  }
  return null;
}

function speakArabic(text) {
  return new Promise((resolve) => {
    speechSynthesis.cancel();
    setTimeout(() => {
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "ar-SA";
      u.rate = 0.7;
      u.pitch = 1.1;
      var voice = pickArabicVoice();
      if (voice) u.voice = voice;
      u.onend = resolve;
      u.onerror = resolve;
      speechSynthesis.speak(u);
    }, 50);
  });
}

function playWordAudio(word) {
  // TTS-based words (level 2)
  if (word.tts) {
    return speakArabic(word.text);
  }
  // CDN-based words (levels 3-7)
  return new Promise((resolve) => {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    var audio = new Audio(ArabicData.getAudioURL(word));
    currentAudio = audio;
    audio.onended = function () { currentAudio = null; resolve(); };
    audio.onerror = function () { currentAudio = null; resolve(); };
    audio.play().catch(function () { resolve(); });
  });
}

// ── Stars ──

function renderStars() {
  starsEl.innerHTML = "";
  for (let i = 0; i < ROUNDS; i++) {
    const span = document.createElement("span");
    span.className = "star" + (i < starsEarned ? " earned" : "");
    span.textContent = i < starsEarned ? "\u2B50" : "\u2606";
    span.style.color = i < starsEarned ? "gold" : "#555";
    starsEl.appendChild(span);
  }
}

// ── Rocket ──

const ROCKET_COLORS = [
  { main: "#ff6b8a", dark: "#e8527a", fin: "#b52e45" },
  { main: "#4a90d9", dark: "#2e6bb5", fin: "#245a9e" },
  { main: "#45c945", dark: "#2ea82e", fin: "#238f23" },
  { main: "#f5a623", dark: "#d4891a", fin: "#b87315" },
  { main: "#a855f7", dark: "#8b3fd9", fin: "#7630bc" },
  { main: "#f472b6", dark: "#d94f9a", fin: "#c03d84" },
  { main: "#facc15", dark: "#d4a90e", fin: "#b8920a" },
  { main: "#22d3ee", dark: "#18a8be", fin: "#1290a3" },
];

function resetRocket() {
  partsBuilt = 0;
  for (const id of ROCKET_PARTS) {
    document.getElementById(id).classList.remove("built");
  }
  flame.classList.remove("active");
  rocketArea.classList.remove("launching");
  launchMsg.classList.remove("show");

  const color = ROCKET_COLORS[Math.floor(Math.random() * ROCKET_COLORS.length)];
  document.getElementById("window-boy").classList.remove("visible");
  rocketArea.style.setProperty("--rocket-main", color.main);
  rocketArea.style.setProperty("--rocket-dark", color.dark);
  rocketArea.style.setProperty("--rocket-fin", color.fin);
}

function addRocketPart() {
  if (partsBuilt < ROCKET_PARTS.length) {
    document.getElementById(ROCKET_PARTS[partsBuilt]).classList.add("built");
    partsBuilt++;
  }
}

// ── Feedback ──

function showFeedback(emoji, btn) {
  const rect = btn.getBoundingClientRect();
  const wrapRect = wrapper.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "feedback-float";
  el.textContent = emoji;
  el.style.left = (rect.left - wrapRect.left + rect.width / 2 - 20) + "px";
  el.style.top = (rect.top - wrapRect.top - 10) + "px";
  wrapper.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ── Shuffle ──

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Level Selector ──

function buildLevelSelector() {
  levelSelect.innerHTML = "";
  const levelKeys = Object.keys(ArabicData.LEVELS);
  levelKeys.forEach((key, i) => {
    const level = ArabicData.LEVELS[key];
    const isLocked = level.locked;
    const btn = document.createElement("button");
    btn.className = "level-btn" + (isLocked ? " locked" : "");
    btn.innerHTML =
      '<div class="level-num">Level ' + (i + 2) + '</div>' +
      '<div class="level-name">' + level.name + (isLocked ? ' 🔒' : '') + '</div>' +
      '<div class="level-desc">' + (isLocked ? level.lockedReason : level.description) + '</div>';
    if (!isLocked) {
      btn.addEventListener("click", () => startGame(key));
    }
    levelSelect.appendChild(btn);
  });
}

// ── Game Logic ──

function pickSessionWords(levelKey) {
  const words = ArabicData.LEVELS[levelKey].words;
  return shuffle(words).slice(0, ROUNDS);
}

function pickDistractors(correctWord, levelKey) {
  const allWords = ArabicData.LEVELS[levelKey].words;
  var pool;
  if (levelKey === "level2") {
    // Same harakat group: match by the vowel (last char of transliteration: a, i, or u)
    var vowel = correctWord.transliteration.slice(-1);
    pool = allWords.filter(w => w.text !== correctWord.text && w.transliteration.slice(-1) === vowel);
  } else {
    pool = allWords.filter(w => w.text !== correctWord.text);
  }
  return shuffle(pool).slice(0, NUM_CHOICES - 1);
}

let selectedChoice = null;
let selectedBtn = null;
const submitBtn = document.getElementById("submit-btn");

function setupRound() {
  const word = sessionWords[currentRound];
  wordDisplay.textContent = word.text;
  wordDisplay.style.fontSize = (currentLevel === "level2") ? "96px" : "";
  wordHint.textContent = "";
  roundLabel.textContent = "Round " + (currentRound + 1) + " / " + ROUNDS;

  const distractors = pickDistractors(word, currentLevel);
  const choices = shuffle([word, ...distractors]);

  soundGrid.innerHTML = "";
  locked = false;
  selectedChoice = null;
  selectedBtn = null;
  submitBtn.classList.remove("visible");

  choices.forEach((choice) => {
    const btn = document.createElement("button");
    btn.className = "sound-btn";
    btn.innerHTML = '<span class="speaker">🔊</span><span class="label">' + choice.transliteration + '</span>';

    btn.addEventListener("click", () => {
      if (locked) return;

      // Deselect previous
      document.querySelectorAll(".sound-btn.selected").forEach(b => b.classList.remove("selected"));

      // Select this one
      btn.classList.add("selected");
      selectedChoice = choice;
      selectedBtn = btn;

      // Show submit button
      submitBtn.classList.add("visible");

      // Play audio preview
      btn.classList.remove("playing");
      void btn.offsetWidth;
      btn.classList.add("playing");
      setTimeout(() => btn.classList.remove("playing"), 800);

      playWordAudio(choice);
    });

    soundGrid.appendChild(btn);
  });
}

submitBtn.addEventListener("click", () => {
  if (locked || !selectedChoice || !selectedBtn) return;
  const word = sessionWords[currentRound];
  handlePick(selectedBtn, selectedChoice, word);
});

function handlePick(btn, picked, correct) {
  if (locked) return;

  if (picked.text === correct.text) {
    locked = true;
    btn.classList.add("correct");
    starsEarned = Math.min(ROUNDS, starsEarned + 1);
    playTone(true);
    renderStars();
    addRocketPart();
    showFeedback("\u2B50", btn);
    wordHint.textContent = correct.translation;
    submitBtn.classList.remove("visible");

    document.querySelectorAll(".sound-btn").forEach(b => b.classList.add("disabled"));

    // Play correct audio one more time, then advance
    setTimeout(() => {
      playWordAudio(correct).then(() => {
        setTimeout(() => {
          currentRound++;
          if (currentRound >= ROUNDS) {
            launchRocket();
          } else {
            setupRound();
          }
        }, 400);
      });
    }, 500);
  } else {
    btn.classList.add("wrong");
    starsEarned = Math.max(0, starsEarned - 1);
    playTone(false);
    renderStars();
    showFeedback("\u274C", btn);
    btn.classList.add("disabled");
    selectedChoice = null;
    selectedBtn = null;
    submitBtn.classList.remove("visible");
  }
}

// ── Smoke ──

function spawnSmoke() {
  const gameArea = document.getElementById("game-area");
  const rocketRect = rocketArea.getBoundingClientRect();
  const areaRect = gameArea.getBoundingClientRect();
  const baseX = rocketRect.left - areaRect.left + rocketRect.width / 2;
  const baseY = rocketRect.top - areaRect.top + rocketRect.height;

  let count = 0;
  const interval = setInterval(() => {
    if (count > 20) { clearInterval(interval); return; }
    const smoke = document.createElement("div");
    smoke.className = "smoke";
    const size = 15 + Math.random() * 30;
    smoke.style.width = size + "px";
    smoke.style.height = size + "px";
    smoke.style.left = (baseX - size / 2 + (Math.random() - 0.5) * 60) + "px";
    smoke.style.top = (baseY - size / 2) + "px";
    smoke.style.transition = "all 1.5s ease-out";
    gameArea.appendChild(smoke);

    requestAnimationFrame(() => {
      smoke.style.top = (baseY + 50 + Math.random() * 80) + "px";
      smoke.style.left = (baseX - size / 2 + (Math.random() - 0.5) * 150) + "px";
      smoke.style.opacity = "0";
      smoke.style.transform = "scale(" + (1.5 + Math.random()) + ")";
    });

    setTimeout(() => smoke.remove(), 1600);
    count++;
  }, 100);
}

// ── Launch ──

function launchRocket() {
  soundGrid.style.visibility = "hidden";
  wordDisplay.style.visibility = "hidden";
  wordHint.style.visibility = "hidden";
  submitBtn.classList.remove("visible");

  const hasBoy = Math.random() < 0.5;
  const boyDelay = hasBoy ? 2500 : 0;

  if (hasBoy) {
    const boy = document.getElementById("window-boy");
    boy.classList.remove("visible");
    void boy.offsetWidth;
    boy.classList.add("visible");
    playChime();
  }

  setTimeout(() => {
    flame.classList.add("active");
    playLaunchSound();
    spawnSmoke();

    setTimeout(() => {
      rocketArea.classList.add("launching");
      launchMsg.classList.add("show");
    }, 600);

    setTimeout(() => endGame(), 3500);
  }, boyDelay);
}

// ── End Game ──

function endGame() {
  endScreen.style.display = "flex";
  const finalStars = document.getElementById("final-stars");
  finalStars.textContent = "";
  for (let i = 0; i < ROUNDS; i++) {
    finalStars.textContent += i < starsEarned ? "\u2B50" : "\u2606";
  }
  const title = document.getElementById("end-title");
  const msg = document.getElementById("end-message");
  if (starsEarned === ROUNDS) {
    title.textContent = "Perfect Launch!";
    msg.textContent = "You read all the words correctly!";
  } else if (starsEarned >= 3) {
    title.textContent = "Great Job!";
    msg.textContent = "Your rocket took off! Keep practicing!";
  } else {
    title.textContent = "Good Try!";
    msg.textContent = "Play again to build a bigger rocket!";
  }
}

// ── Start / Restart ──

function startGame(levelKey) {
  currentLevel = levelKey;
  startScreen.style.display = "none";
  endScreen.style.display = "none";
  soundGrid.style.visibility = "visible";
  wordDisplay.style.visibility = "visible";
  wordHint.style.visibility = "visible";
  starsEarned = 0;
  currentRound = 0;
  sessionWords = pickSessionWords(levelKey);
  resetRocket();
  renderStars();
  setupRound();
}

function showLevelSelect() {
  endScreen.style.display = "none";
  startScreen.style.display = "flex";
}

document.getElementById("restart-btn").addEventListener("click", () => startGame(currentLevel));
document.getElementById("change-level-btn").addEventListener("click", showLevelSelect);

// ── Init ──
// Preload voices (needed for Arabic TTS)
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = function () { speechSynthesis.getVoices(); };
}
speechSynthesis.getVoices();

buildLevelSelector();
renderStars();
</script>
