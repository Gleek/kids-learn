<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Rocket!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8f4fd;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(500px, 100vw - 20px);
    text-align: center;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #ffffff;
    border-radius: 16px 16px 0 0;
    border: 3px solid #c5d3f7;
    border-bottom: none;
  }

  #round-label {
    font-size: 18px;
    color: #636e72;
    font-weight: 600;
  }

  #stars {
    display: flex;
    gap: 6px;
  }

  .star {
    font-size: 28px;
    transition: all 0.3s;
  }
  .star.earned { filter: drop-shadow(0 0 6px gold); }

  #game-area {
    background: linear-gradient(180deg, #b3e0ff 0%, #e8f4fd 100%);
    border: 3px solid #c5d3f7;
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 20px 20px 30px;
    position: relative;
    overflow: hidden;
  }

  /* Twinkling stars background */
  #game-area::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(1px 1px at 20% 15%, white, transparent),
                radial-gradient(1px 1px at 60% 25%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(1px 1px at 10% 40%, white, transparent),
                radial-gradient(1px 1px at 45% 5%, white, transparent),
                radial-gradient(1px 1px at 90% 35%, white, transparent),
                radial-gradient(1.5px 1.5px at 30% 50%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 70% 45%, white, transparent);
    pointer-events: none;
    z-index: 0;
  }

  #word-display {
    font-size: 56px;
    font-weight: 900;
    color: #2d3436;
    letter-spacing: 12px;
    text-shadow: none;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  #vehicle-area {
    position: relative;
    margin: 0 auto 24px;
    z-index: 1;
  }

  #emoji-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 14px;
    max-width: 340px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .emoji-btn {
    font-size: 48px;
    width: 96px;
    height: 96px;
    border-radius: 18px;
    border: 4px solid #c5d3f7;
    background: #f0f4ff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }

  .emoji-btn:hover {
    transform: scale(1.08);
    border-color: #ff6b8a;
    background: #fff0f3;
  }

  .emoji-btn:active { transform: scale(0.95); }

  .emoji-btn.correct {
    border-color: #4caf50;
    background: #e8f5e9;
    animation: pop 0.4s;
  }

  .emoji-btn.wrong {
    border-color: #ff6b8a;
    background: #fce4ec;
    animation: shake 0.4s;
  }

  .emoji-btn.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(240, 244, 255, 0.97);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 20;
  }

  .overlay h1 {
    font-size: 42px;
    color: #ff6b8a;
    margin-bottom: 16px;
  }

  .overlay p {
    font-size: 22px;
    color: #2d3436;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
  }

  .overlay .final-stars {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .btn {
    font-size: 28px;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    background: #ff6b8a;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .btn:hover { background: #e8527a; transform: scale(1.05); }

  .feedback-float {
    position: absolute;
    font-size: 56px;
    z-index: 15;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="round-label">Round 1 / 5</div>
    <div id="stars"></div>
  </div>
  <div id="game-area">
    <div id="word-display">CAT</div>

    <div id="vehicle-area"></div>

    <div id="emoji-grid"></div>
  </div>

  <div class="overlay" id="start-screen">
    <h1>🚀 Build a Rocket!</h1>
    <p>Read the word.<br>Pick the right emoji to<br>build your rocket piece by piece!</p>
    <button class="btn" id="start-btn">GO!</button>
  </div>

  <div class="overlay" id="end-screen" style="display:none;">
    <h1 id="end-title">Great Job!</h1>
    <div class="final-stars" id="final-stars"></div>
    <p id="end-message"></p>
    <button class="btn" id="restart-btn">Play Again!</button>
    <a href="index.html" class="btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;text-decoration:none;display:inline-block;text-align:center;">Home</a>
  </div>
</div>

<script src="shared/data.js"></script>
<script src="shared/game.js"></script>
<script src="shared/builder.js"></script>
<script>
const CVC_WORDS = GameData.CVC_WORDS;

const ROUNDS = 5;
const GRID_SIZE = 9;
const wordDisplay = document.getElementById("word-display");
const emojiGrid = document.getElementById("emoji-grid");
const starsEl = document.getElementById("stars");
const roundLabel = document.getElementById("round-label");
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const wrapper = document.getElementById("game-wrapper");
const vehicleArea = document.getElementById("vehicle-area");

let currentRound = 0;
let starsEarned = 0;
let sessionWords = [];
let locked = false;

function renderStars() {
  KidsGame.renderStars(starsEl, starsEarned, ROUNDS);
}

function pickSessionWords() {
  return KidsGame.pickRandom(CVC_WORDS, ROUNDS);
}

function pickDistractors(correctEmoji, count) {
  return KidsGame.pickDistractors(CVC_WORDS, { emoji: correctEmoji }, count, {
    getKey: w => w.emoji,
  }).map(w => w.emoji);
}

function setupRound() {
  const word = sessionWords[currentRound];
  wordDisplay.textContent = word.word;
  roundLabel.textContent = `Round ${currentRound + 1} / ${ROUNDS}`;

  const distractors = pickDistractors(word.emoji, GRID_SIZE - 1);
  const allEmojis = KidsGame.shuffle([word.emoji, ...distractors]);

  emojiGrid.innerHTML = "";
  locked = false;

  for (const emoji of allEmojis) {
    const btn = document.createElement("button");
    btn.className = "emoji-btn";
    btn.textContent = emoji;
    btn.addEventListener("click", () => handlePick(btn, emoji, word.emoji));
    emojiGrid.appendChild(btn);
  }
}

function handlePick(btn, picked, correct) {
  if (locked) return;

  if (picked === correct) {
    locked = true;
    btn.classList.add("correct");
    starsEarned = Math.min(ROUNDS, starsEarned + 1);
    KidsGame.playTone(true);
    renderStars();
    Builder.addPart();
    KidsGame.showFeedback("⭐", btn, wrapper, 800);

    document.querySelectorAll(".emoji-btn").forEach(b => b.classList.add("disabled"));

    setTimeout(() => {
      currentRound++;
      if (currentRound >= ROUNDS) {
        celebrateAndEnd();
      } else {
        setupRound();
      }
    }, 1000);
  } else {
    btn.classList.add("wrong");
    starsEarned = Math.max(0, starsEarned - 1);
    KidsGame.playTone(false);
    renderStars();
    KidsGame.showFeedback("❌", btn, wrapper, 800);
    btn.classList.add("disabled");
  }
}

function celebrateAndEnd() {
  emojiGrid.style.visibility = "hidden";
  wordDisplay.style.visibility = "hidden";

  Builder.celebrate(function () {
    endGame();
  });
}

function endGame() {
  KidsGame.showEndScreen({
    screenEl: endScreen,
    titleEl: document.getElementById("end-title"),
    messageEl: document.getElementById("end-message"),
    finalStarsEl: document.getElementById("final-stars"),
    earned: starsEarned,
    total: ROUNDS,
    reward: { enabled: false },
    messages: {
      perfect: { title: "Perfect Launch! 🚀", message: "You built the whole rocket and got all stars!" },
      good: { title: "Great Job! 🚀", message: "Your rocket took off! Keep practicing!" },
      try: { title: "Good Try!", message: "Play again to build a bigger rocket!" },
    },
  });
}

function startGame() {
  startScreen.style.display = "none";
  endScreen.style.display = "none";
  emojiGrid.style.visibility = "visible";
  wordDisplay.style.visibility = "visible";
  starsEarned = 0;
  currentRound = 0;
  sessionWords = pickSessionWords();
  Builder.init(vehicleArea, 'random');
  renderStars();
  setupRound();
}

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("restart-btn").addEventListener("click", startGame);

renderStars();
</script>

</body>
</html>
