<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Rocket!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0e2a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(500px, 100vw - 20px);
    text-align: center;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #16213e;
    border-radius: 16px 16px 0 0;
    border: 3px solid #0f3460;
    border-bottom: none;
  }

  #round-label {
    font-size: 18px;
    color: #aaa;
    font-weight: 600;
  }

  #stars {
    display: flex;
    gap: 6px;
  }

  .star {
    font-size: 28px;
    transition: all 0.3s;
  }
  .star.earned { filter: drop-shadow(0 0 6px gold); }

  #game-area {
    background: linear-gradient(180deg, #0b0e2a 0%, #16213e 100%);
    border: 3px solid #0f3460;
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 20px 20px 30px;
    position: relative;
    overflow: hidden;
  }

  /* Twinkling stars background */
  #game-area::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(1px 1px at 20% 15%, white, transparent),
                radial-gradient(1px 1px at 60% 25%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(1px 1px at 10% 40%, white, transparent),
                radial-gradient(1px 1px at 45% 5%, white, transparent),
                radial-gradient(1px 1px at 90% 35%, white, transparent),
                radial-gradient(1.5px 1.5px at 30% 50%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 70% 45%, white, transparent);
    pointer-events: none;
    z-index: 0;
  }

  #word-display {
    font-size: 56px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 12px;
    text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  #rocket-area {
    position: relative;
    height: 280px;
    margin: 0 auto 24px;
    width: 140px;
    z-index: 1;
  }

  .rocket-part {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.5s, transform 0.5s;
    opacity: 0;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  }

  .rocket-part.built {
    opacity: 1;
    animation: partAppear 0.5s ease-out;
  }

  @keyframes partAppear {
    0% { transform: translateX(-50%) scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: translateX(-50%) scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
  }

  /* Rocket pieces drawn with CSS */
  #part-engine {
    bottom: 0;
    width: 80px;
    height: 50px;
  }
  #part-engine .base {
    width: 80px;
    height: 30px;
    background: #555;
    border-radius: 0 0 10px 10px;
    margin: 0 auto;
  }
  #part-engine .nozzle {
    width: 30px;
    height: 20px;
    background: #333;
    border-radius: 0 0 8px 8px;
    margin: 0 auto;
  }

  #part-body-lower {
    bottom: 45px;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, var(--rocket-main), var(--rocket-dark));
    border-radius: 4px;
  }

  #part-body-upper {
    bottom: 110px;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, var(--rocket-main), var(--rocket-dark));
    border-radius: 4px;
  }

  #part-window {
    bottom: 120px;
    width: 30px;
    height: 30px;
    background: radial-gradient(circle at 40% 35%, #a8e6ff, #4a9cc7);
    border: 3px solid #ddd;
    border-radius: 50%;
    z-index: 2;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #window-boy {
    font-size: 18px;
    line-height: 1;
    opacity: 0;
  }

  #window-boy.visible {
    opacity: 1;
    animation: boyFadeIn 0.8s ease-out forwards, boyWave 0.5s ease-in-out 0.8s 3;
  }

  @keyframes boyFadeIn {
    0% { opacity: 0; transform: scale(0.2); }
    60% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes boyWave {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(12deg); }
  }

  #part-nose {
    bottom: 175px;
    width: 0;
    height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 60px solid var(--rocket-dark);
    border-radius: 4px;
  }

  /* Fins */
  #part-body-lower::before, #part-body-lower::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
  }
  #part-body-lower::before {
    left: -18px;
    border-left: 18px solid transparent;
    border-bottom: 40px solid var(--rocket-fin);
  }
  #part-body-lower::after {
    right: -18px;
    border-right: 18px solid transparent;
    border-bottom: 40px solid var(--rocket-fin);
  }

  /* Flame */
  #flame {
    position: absolute;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  #flame.active {
    opacity: 1;
    animation: flicker 0.15s infinite alternate;
  }

  @keyframes flicker {
    0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
    100% { transform: translateX(-50%) scaleY(1.15) scaleX(0.9); }
  }

  .flame-outer {
    width: 40px;
    height: 70px;
    background: linear-gradient(to top, transparent, #ff6600, #ff9900);
    border-radius: 50% 50% 30% 30%;
    position: relative;
  }

  .flame-inner {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 45px;
    background: linear-gradient(to top, transparent, #ffcc00, #fff);
    border-radius: 50% 50% 30% 30%;
  }

  /* Launch animation */
  #rocket-area.launching {
    animation: launch 2.5s ease-in forwards;
  }

  @keyframes launch {
    0% { transform: translateY(0); }
    10% { transform: translateY(5px); }
    100% { transform: translateY(-800px); }
  }

  /* Smoke particles */
  .smoke {
    position: absolute;
    border-radius: 50%;
    background: rgba(200, 200, 200, 0.6);
    pointer-events: none;
    z-index: 0;
  }

  #emoji-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 14px;
    max-width: 340px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .emoji-btn {
    font-size: 48px;
    width: 96px;
    height: 96px;
    border-radius: 18px;
    border: 4px solid #0f3460;
    background: #1a1a2e;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }

  .emoji-btn:hover {
    transform: scale(1.08);
    border-color: #e94560;
    background: #222244;
  }

  .emoji-btn:active { transform: scale(0.95); }

  .emoji-btn.correct {
    border-color: #4caf50;
    background: #1b3d1b;
    animation: pop 0.4s;
  }

  .emoji-btn.wrong {
    border-color: #e94560;
    background: #3d1b1b;
    animation: shake 0.4s;
  }

  .emoji-btn.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(11, 14, 42, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 20;
  }

  .overlay h1 {
    font-size: 42px;
    color: #e94560;
    margin-bottom: 16px;
  }

  .overlay p {
    font-size: 22px;
    color: #eee;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
  }

  .overlay .final-stars {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .btn {
    font-size: 28px;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    background: #e94560;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .btn:hover { background: #c73652; transform: scale(1.05); }

  .feedback-float {
    position: absolute;
    font-size: 56px;
    z-index: 15;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  #launch-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 30px #ffd700;
    z-index: 15;
    opacity: 0;
    pointer-events: none;
  }

  #launch-msg.show {
    animation: launchText 2.5s forwards;
  }

  @keyframes launchText {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1.3); }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="round-label">Round 1 / 5</div>
    <div id="stars"></div>
  </div>
  <div id="game-area">
    <div id="word-display">CAT</div>

    <div id="rocket-area">
      <div class="rocket-part" id="part-nose"></div>
      <div class="rocket-part" id="part-window"><span id="window-boy">👦</span></div>
      <div class="rocket-part" id="part-body-upper"></div>
      <div class="rocket-part" id="part-body-lower"></div>
      <div class="rocket-part" id="part-engine">
        <div class="base"></div>
        <div class="nozzle"></div>
      </div>
      <div id="flame">
        <div class="flame-outer">
          <div class="flame-inner"></div>
        </div>
      </div>
    </div>

    <div id="launch-msg">LIFTOFF! 🚀</div>

    <div id="emoji-grid"></div>
  </div>

  <div class="overlay" id="start-screen">
    <h1>🚀 Build a Rocket!</h1>
    <p>Read the word.<br>Pick the right emoji to<br>build your rocket piece by piece!</p>
    <button class="btn" id="start-btn">GO!</button>
  </div>

  <div class="overlay" id="end-screen" style="display:none;">
    <h1 id="end-title">Great Job!</h1>
    <div class="final-stars" id="final-stars"></div>
    <p id="end-message"></p>
    <button class="btn" id="restart-btn">Play Again!</button>
  </div>
</div>

<script src="shared/data.js"></script>
<script>
const CVC_WORDS = GameData.CVC_WORDS;

const ROUNDS = 5;
const GRID_SIZE = 9;
const ROCKET_PARTS = ["part-engine", "part-body-lower", "part-body-upper", "part-window", "part-nose"];

const wordDisplay = document.getElementById("word-display");
const emojiGrid = document.getElementById("emoji-grid");
const starsEl = document.getElementById("stars");
const roundLabel = document.getElementById("round-label");
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const wrapper = document.getElementById("game-wrapper");
const rocketArea = document.getElementById("rocket-area");
const flame = document.getElementById("flame");
const launchMsg = document.getElementById("launch-msg");

let currentRound = 0;
let starsEarned = 0;
let partsBuilt = 0;
let sessionWords = [];
let locked = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(success) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;
  if (success) {
    osc.frequency.value = 523;
    osc.type = "sine";
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } else {
    osc.frequency.value = 200;
    osc.type = "square";
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }
}

function playLaunchSound() {
  // Rumble
  const noise = audioCtx.createOscillator();
  const noiseGain = audioCtx.createGain();
  noise.type = "sawtooth";
  noise.frequency.value = 80;
  noise.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  noiseGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
  noise.start();
  noise.stop(audioCtx.currentTime + 2.5);

  // Rising tone
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
  osc.start();
  osc.stop(audioCtx.currentTime + 2.5);
}

function renderStars() {
  starsEl.innerHTML = "";
  for (let i = 0; i < ROUNDS; i++) {
    const span = document.createElement("span");
    span.className = "star" + (i < starsEarned ? " earned" : "");
    span.textContent = i < starsEarned ? "⭐" : "☆";
    span.style.color = i < starsEarned ? "gold" : "#555";
    starsEl.appendChild(span);
  }
}

const ROCKET_COLORS = [
  { main: "#e94560", dark: "#c73652", fin: "#b52e45" },  // red
  { main: "#4a90d9", dark: "#2e6bb5", fin: "#245a9e" },  // blue
  { main: "#45c945", dark: "#2ea82e", fin: "#238f23" },  // green
  { main: "#f5a623", dark: "#d4891a", fin: "#b87315" },  // orange
  { main: "#a855f7", dark: "#8b3fd9", fin: "#7630bc" },  // purple
  { main: "#f472b6", dark: "#d94f9a", fin: "#c03d84" },  // pink
  { main: "#facc15", dark: "#d4a90e", fin: "#b8920a" },  // yellow
  { main: "#22d3ee", dark: "#18a8be", fin: "#1290a3" },  // cyan
];

function resetRocket() {
  partsBuilt = 0;
  for (const id of ROCKET_PARTS) {
    document.getElementById(id).classList.remove("built");
  }
  flame.classList.remove("active");
  rocketArea.classList.remove("launching");
  launchMsg.classList.remove("show");

  const color = ROCKET_COLORS[Math.floor(Math.random() * ROCKET_COLORS.length)];
  document.getElementById("window-boy").classList.remove("visible");
  rocketArea.style.setProperty("--rocket-main", color.main);
  rocketArea.style.setProperty("--rocket-dark", color.dark);
  rocketArea.style.setProperty("--rocket-fin", color.fin);
}

function addRocketPart() {
  if (partsBuilt < ROCKET_PARTS.length) {
    document.getElementById(ROCKET_PARTS[partsBuilt]).classList.add("built");
    partsBuilt++;
  }
}

function pickSessionWords() {
  const shuffled = [...CVC_WORDS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, ROUNDS);
}

function pickDistractors(correctEmoji, count) {
  const pool = CVC_WORDS.filter(w => w.emoji !== correctEmoji)
    .map(w => w.emoji)
    .sort(() => Math.random() - 0.5);
  return pool.slice(0, count);
}

function setupRound() {
  const word = sessionWords[currentRound];
  wordDisplay.textContent = word.word;
  roundLabel.textContent = `Round ${currentRound + 1} / ${ROUNDS}`;

  const distractors = pickDistractors(word.emoji, GRID_SIZE - 1);
  const allEmojis = [word.emoji, ...distractors].sort(() => Math.random() - 0.5);

  emojiGrid.innerHTML = "";
  locked = false;

  for (const emoji of allEmojis) {
    const btn = document.createElement("button");
    btn.className = "emoji-btn";
    btn.textContent = emoji;
    btn.addEventListener("click", () => handlePick(btn, emoji, word.emoji));
    emojiGrid.appendChild(btn);
  }
}

function handlePick(btn, picked, correct) {
  if (locked) return;

  if (picked === correct) {
    locked = true;
    btn.classList.add("correct");
    starsEarned = Math.min(ROUNDS, starsEarned + 1);
    playTone(true);
    renderStars();
    addRocketPart();
    showFeedback("⭐", btn);

    document.querySelectorAll(".emoji-btn").forEach(b => b.classList.add("disabled"));

    setTimeout(() => {
      currentRound++;
      if (currentRound >= ROUNDS) {
        launchRocket();
      } else {
        setupRound();
      }
    }, 1000);
  } else {
    btn.classList.add("wrong");
    starsEarned = Math.max(0, starsEarned - 1);
    playTone(false);
    renderStars();
    showFeedback("❌", btn);
    btn.classList.add("disabled");
  }
}

function showFeedback(emoji, btn) {
  const rect = btn.getBoundingClientRect();
  const wrapRect = wrapper.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "feedback-float";
  el.textContent = emoji;
  el.style.left = (rect.left - wrapRect.left + rect.width / 2 - 20) + "px";
  el.style.top = (rect.top - wrapRect.top - 10) + "px";
  wrapper.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function spawnSmoke() {
  const gameArea = document.getElementById("game-area");
  const rocketRect = rocketArea.getBoundingClientRect();
  const areaRect = gameArea.getBoundingClientRect();
  const baseX = rocketRect.left - areaRect.left + rocketRect.width / 2;
  const baseY = rocketRect.top - areaRect.top + rocketRect.height;

  let count = 0;
  const interval = setInterval(() => {
    if (count > 20) { clearInterval(interval); return; }
    const smoke = document.createElement("div");
    smoke.className = "smoke";
    const size = 15 + Math.random() * 30;
    smoke.style.width = size + "px";
    smoke.style.height = size + "px";
    smoke.style.left = (baseX - size / 2 + (Math.random() - 0.5) * 60) + "px";
    smoke.style.top = (baseY - size / 2) + "px";
    smoke.style.transition = "all 1.5s ease-out";
    gameArea.appendChild(smoke);

    requestAnimationFrame(() => {
      smoke.style.top = (baseY + 50 + Math.random() * 80) + "px";
      smoke.style.left = (baseX - size / 2 + (Math.random() - 0.5) * 150) + "px";
      smoke.style.opacity = "0";
      smoke.style.transform = `scale(${1.5 + Math.random()})`;
    });

    setTimeout(() => smoke.remove(), 1600);
    count++;
  }, 100);
}

function playChime() {
  const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
    osc.start(t);
    osc.stop(t + 0.5);
  });
}

function launchRocket() {
  // Hide grid and word
  emojiGrid.style.visibility = "hidden";
  wordDisplay.style.visibility = "hidden";

  const hasBoy = Math.random() < 0.5;
  const boyDelay = hasBoy ? 2500 : 0; // wait for fade-in + wave + chime

  if (hasBoy) {
    const boy = document.getElementById("window-boy");
    // Force animation restart by triggering reflow
    boy.classList.remove("visible");
    void boy.offsetWidth;
    boy.classList.add("visible");
    playChime();
  }

  setTimeout(() => {
    // Ignite flame
    flame.classList.add("active");
    playLaunchSound();
    spawnSmoke();

    // Shake briefly then launch
    setTimeout(() => {
      rocketArea.classList.add("launching");
      launchMsg.classList.add("show");
    }, 600);

    // Show end screen
    setTimeout(() => {
      endGame();
    }, 3500);
  }, boyDelay);
}

function endGame() {
  endScreen.style.display = "flex";
  const finalStars = document.getElementById("final-stars");
  finalStars.textContent = "";
  for (let i = 0; i < ROUNDS; i++) {
    finalStars.textContent += i < starsEarned ? "⭐" : "☆";
  }
  const title = document.getElementById("end-title");
  const msg = document.getElementById("end-message");
  if (starsEarned === ROUNDS) {
    title.textContent = "Perfect Launch! 🚀";
    msg.textContent = "You built the whole rocket and got all stars!";
  } else if (starsEarned >= 3) {
    title.textContent = "Great Job! 🚀";
    msg.textContent = "Your rocket took off! Keep practicing!";
  } else {
    title.textContent = "Good Try!";
    msg.textContent = "Play again to build a bigger rocket!";
  }
}

function startGame() {
  startScreen.style.display = "none";
  endScreen.style.display = "none";
  emojiGrid.style.visibility = "visible";
  wordDisplay.style.visibility = "visible";
  starsEarned = 0;
  currentRound = 0;
  sessionWords = pickSessionWords();
  resetRocket();
  renderStars();
  setupRound();
}

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("restart-btn").addEventListener("click", startGame);

renderStars();
</script>

</body>
</html>
