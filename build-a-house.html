<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build with Shapes! — Kids Learn</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    :root { --wrapper-width: 540px; }

    .prompt-text {
      font-size: 44px;
      font-weight: 900;
      color: var(--text-color);
      text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
      margin-bottom: 8px;
      letter-spacing: 4px;
    }

    .prompt-sub {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .scene-title {
      font-size: 15px;
      color: #ffd700;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* ── Build Area ── */
    #build-area {
      position: relative;
      width: 320px;
      height: 270px;
      margin: 0 auto 20px;
    }

    /* ── Pre-built decorative parts ── */
    .prebuilt {
      position: absolute;
      pointer-events: none;
    }

    /* ── Frames ── */
    .build-frame {
      position: absolute;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }

    .build-frame:not(.filled):not(.tri-frame):not(.diamond-frame) {
      border: 3px dashed rgba(255, 255, 255, 0.25);
    }

    .build-frame.active:not(.tri-frame):not(.diamond-frame) {
      border-color: #ffd700;
      animation: framePulse 1s ease-in-out infinite;
    }

    .build-frame.filled {
      border: none !important;
      animation: pieceLand 0.4s ease-out;
    }

    @keyframes pieceLand {
      0% { transform: scale(1.15); filter: brightness(1.4); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    /* Triangle frames */
    .build-frame.tri-frame {
      border: none;
    }
    .tri-outline {
      width: 100%; height: 100%;
      position: relative;
    }
    .tri-outline svg {
      width: 100%; height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .tri-outline svg polygon {
      fill: none;
      stroke: rgba(255, 255, 255, 0.25);
      stroke-width: 3;
      stroke-dasharray: 8, 6;
    }
    .build-frame.tri-frame.active .tri-outline svg polygon {
      stroke: #ffd700;
      animation: triStrokePulse 1s ease-in-out infinite;
    }
    @keyframes triStrokePulse {
      0%, 100% { stroke: #ffd700; filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.3)); }
      50% { stroke: #fff; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6)); }
    }
    .build-frame.tri-frame.filled .tri-outline svg { display: none; }

    /* Diamond frames */
    .build-frame.diamond-frame { border: none; overflow: visible; }
    .diamond-outline {
      width: 100%; height: 100%;
      transform: rotate(45deg);
      border: 3px dashed rgba(255, 255, 255, 0.25);
    }
    .build-frame.diamond-frame.active .diamond-outline {
      border-color: #ffd700;
      animation: framePulse 1s ease-in-out infinite;
    }
    .build-frame.diamond-frame.filled .diamond-outline {
      border: none; animation: none;
    }

    /* Oval frames */
    .build-frame.oval-frame { border-radius: 50%; }
    /* Circle frames */
    .build-frame.circle-frame { border-radius: 50%; }

    @keyframes framePulse {
      0%, 100% { border-color: #ffd700; box-shadow: 0 0 8px rgba(255, 215, 0, 0.3); }
      50% { border-color: #fff; box-shadow: 0 0 16px rgba(255, 215, 0, 0.6); }
    }

    /* Label inside frame */
    .frame-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      pointer-events: none;
      white-space: nowrap;
    }
    .build-frame.filled .frame-label { display: none; }
    .build-frame.active .frame-label { color: rgba(255, 215, 0, 0.7); }

    /* ── Shape Choice Grid ── */
    #shape-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 320px;
      margin: 0 auto;
    }

    .shape-btn {
      width: 130px;
      height: 110px;
      border-radius: 18px;
      border: 4px solid var(--border-color);
      background: var(--bg-color);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }
    .shape-btn:hover { transform: scale(1.06); border-color: var(--accent); background: #222244; }
    .shape-btn:active { transform: scale(0.95); }
    .shape-btn.correct { border-color: #4caf50; background: #1b3d1b; animation: pop 0.4s; }
    .shape-btn.wrong { border-color: var(--accent); background: #3d1b1b; animation: shake 0.4s; }
    .shape-btn.disabled { pointer-events: none; opacity: 0.5; }
    .shape-btn .shape-name { font-size: 13px; color: var(--text-muted); font-weight: 600; }

    /* ── CSS Shapes (in buttons) ── */
    .css-shape { display: inline-block; }
    .css-shape.square { width: 55px; height: 55px; border-radius: 4px; }
    .css-shape.rectangle { width: 75px; height: 42px; border-radius: 4px; }
    .css-shape.circle { width: 55px; height: 55px; border-radius: 50%; }
    .css-shape.triangle {
      width: 0; height: 0;
      border-left: 33px solid transparent; border-right: 33px solid transparent;
      border-bottom: 55px solid currentColor;
    }
    .css-shape.diamond { width: 42px; height: 42px; transform: rotate(45deg); border-radius: 4px; }
    .css-shape.oval { width: 72px; height: 42px; border-radius: 50%; }

    /* ── Scene Picker ── */
    #pick-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(22, 33, 62, 0.97);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 20px;
      border-radius: 16px;
      z-index: 10;
      overflow-y: auto;
    }

    #pick-overlay h2 {
      font-size: 30px;
      color: #ffd700;
      margin-bottom: 16px;
    }

    .pick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 420px;
    }

    .pick-card {
      background: var(--bg-color);
      border: 3px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }

    .pick-card:hover {
      transform: scale(1.06);
      border-color: #ffd700;
      background: #222244;
    }

    .pick-card:active { transform: scale(0.95); }

    .pick-card .pick-icon { font-size: 38px; line-height: 1; }
    .pick-card .pick-name { font-size: 13px; color: var(--text-muted); font-weight: 600; }

    .pick-random {
      margin-top: 14px;
      font-size: 20px;
      padding: 10px 36px;
    }
  </style>
</head>

            filledCSS: "background:linear-gradient(180deg,#ef5350,#e53935);border:3px solid #c62828;border-radius:4px;box-shadow:0 -2px 6px rgba(0,0,0,0.15);" },
          { id: "f3", shape: "Circle", hint: "for the front wheel", type: "circle",
            css: "bottom:14px;left:210px;width:46px;height:46px;z-index:3;",
            filledCSS: "background:radial-gradient(circle at 38% 35%,#616161,#212121);border:4px solid #424242;box-shadow:0 2px 8px rgba(0,0,0,0.4);" },
          { id: "f4", shape: "Circle", hint: "for the back wheel", type: "circle",
            css: "bottom:14px;left:60px;width:46px;height:46px;z-index:3;",
            filledCSS: "background:radial-gradient(circle at 38% 35%,#616161,#212121);border:4px solid #424242;box-shadow:0 2px 8px rgba(0,0,0,0.4);" },
        ]
      },
      {
        name: "Butterfly", icon: "\uD83E\uDD8B",
        prebuilt: [
          // Sky
          { css: "top:0;left:0;width:320px;height:270px;background:linear-gradient(180deg,#e1f5fe,#b3e5fc);border-radius:4px;z-index:0;" },
          // Body (thin vertical)
          { css: "bottom:80px;left:154px;width:12px;height:100px;background:linear-gradient(180deg,#5d4037,#4e342e);border-radius:6px;z-index:3;" },
          // Head
          { css: "bottom:174px;left:148px;width:24px;height:24px;background:radial-gradient(circle at 40% 35%,#6d4c41,#4e342e);border-radius:50%;z-index:4;" },
          // Antennae
          { css: "bottom:194px;left:142px;width:3px;height:30px;background:#5d4037;transform:rotate(-20deg);z-index:3;" },
          { css: "bottom:194px;left:176px;width:3px;height:30px;background:#5d4037;transform:rotate(20deg);z-index:3;" },
          // Antennae tips
          { css: "bottom:220px;left:130px;width:10px;height:10px;background:radial-gradient(circle,#ffd600,#f9a825);border-radius:50%;z-index:4;" },
          { css: "bottom:220px;left:180px;width:10px;height:10px;background:radial-gradient(circle,#ffd600,#f9a825);border-radius:50%;z-index:4;" },
          // Small dots on wings (decorative)
          { css: "bottom:144px;left:100px;width:14px;height:14px;background:radial-gradient(circle,#fff9c4,#ffd600);border-radius:50%;z-index:4;" },
          { css: "bottom:144px;left:208px;width:14px;height:14px;background:radial-gradient(circle,#fff9c4,#ffd600);border-radius:50%;z-index:4;" },
        ],
        frames: [
          { id: "f0", shape: "Oval", hint: "for the top left wing", type: "oval",
            css: "bottom:146px;left:64px;width:86px;height:60px;z-index:2;transform:rotate(-15deg);",
            filledCSS: "background:linear-gradient(135deg,#e91e63,#c2185b);box-shadow:inset 0 -4px 10px rgba(0,0,0,0.1),0 4px 10px rgba(0,0,0,0.15);" },
          { id: "f1", shape: "Oval", hint: "for the top right wing", type: "oval",
            css: "bottom:146px;left:172px;width:86px;height:60px;z-index:2;transform:rotate(15deg);",
            filledCSS: "background:linear-gradient(135deg,#1e88e5,#1565c0);box-shadow:inset 0 -4px 10px rgba(0,0,0,0.1),0 4px 10px rgba(0,0,0,0.15);" },
          { id: "f2", shape: "Oval", hint: "for the bottom left wing", type: "oval",
            css: "bottom:88px;left:74px;width:74px;height:50px;z-index:2;transform:rotate(10deg);",
            filledCSS: "background:linear-gradient(135deg,#ff7043,#f4511e);box-shadow:inset 0 -4px 8px rgba(0,0,0,0.1),0 3px 8px rgba(0,0,0,0.15);" },
          { id: "f3", shape: "Oval", hint: "for the bottom right wing", type: "oval",
            css: "bottom:88px;left:174px;width:74px;height:50px;z-index:2;transform:rotate(-10deg);",
            filledCSS: "background:linear-gradient(135deg,#fdd835,#f9a825);box-shadow:inset 0 -4px 8px rgba(0,0,0,0.1),0 3px 8px rgba(0,0,0,0.15);" },
          { id: "f4", shape: "Circle", hint: "for the eye", type: "circle",
            css: "bottom:178px;left:152px;width:16px;height:16px;z-index:5;",
            filledCSS: "background:radial-gradient(circle at 35% 35%,#fff,#e0e0e0);border:2px solid #333;" },
        ]
      },
    ];

    // Triangle fill colors per scene
    const TRI_FILLS = {
      "House": { f3: "linear-gradient(180deg,#c62828,#b71c1c)" },
      "Snowman": { f3: "linear-gradient(180deg,#ff9800,#e65100)" },
      "Boat": { f0: "linear-gradient(180deg,#6d4c41,#4e342e)", f4: "rgba(255,255,255,0.85)" },
      "Fish": { f1: "linear-gradient(135deg,#00bcd4,#00838f)", f2: "linear-gradient(135deg,#26c6da,#0097a7)", f3: "linear-gradient(135deg,#26c6da,#0097a7)" },
      "Tree": { f1: "linear-gradient(180deg,#388e3c,#2e7d32)", f2: "linear-gradient(180deg,#43a047,#388e3c)", f3: "linear-gradient(180deg,#4caf50,#43a047)" },
      "Mouse": { f0: "linear-gradient(180deg,#7e57c2,#5e35b1)" },
      "Car": { f1: "linear-gradient(135deg,#b3e5fc,#81d4fa)" },
    };

    let round, stars, answered, currentScene, frameEls;

    const $ = id => document.getElementById(id);
    const $roundLabel  = $("round-label");
    const $stars       = $("stars");
    const $prompt      = $("prompt-text");
    const $promptSub   = $("prompt-sub");
    const $sceneTitle  = $("scene-title");
    const $shapeGrid   = $("shape-grid");
    const $buildArea   = $("build-area");
    const $startOv     = $("start-overlay");
    const $pickOv      = $("pick-overlay");
    const $pickGrid    = $("pick-grid");
    const $endOv       = $("end-overlay");
    const $endTitle    = $("end-title");
    const $endMsg      = $("end-message");
    const $finalStars  = $("final-stars");
    const $rewardOv    = $("reward-overlay");
    const $rewardEmoji = $("reward-emoji");
    const $wrapper     = $("game-wrapper");

    function buildScene(scene) {
      $buildArea.innerHTML = "";
      frameEls = {};

      // Render prebuilt decorative parts
      scene.prebuilt.forEach(p => {
        const el = document.createElement("div");
        el.className = "prebuilt";
        el.setAttribute("style", p.css);
        $buildArea.appendChild(el);
      });

      // Render interactive frames
      scene.frames.forEach(f => {
        const el = document.createElement("div");
        el.id = f.id;
        el.className = "build-frame";
        el.setAttribute("style", f.css);

        if (f.type === "circle") el.classList.add("circle-frame");
        if (f.type === "oval") el.classList.add("oval-frame");

        if (f.type === "tri") {
          el.classList.add("tri-frame");
          const outline = document.createElement("div");
          outline.className = "tri-outline";
          outline.innerHTML = '<svg viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="50,2 2,98 98,98"/></svg>';
          el.appendChild(outline);
        }

        if (f.type === "diamond") {
          el.classList.add("diamond-frame");
          const outline = document.createElement("div");
          outline.className = "diamond-outline";
          el.appendChild(outline);
        }

        const label = document.createElement("span");
        label.className = "frame-label";
        label.textContent = f.shape.toLowerCase();
        el.appendChild(label);

        $buildArea.appendChild(el);
        frameEls[f.id] = el;
      });
    }

    function activateFrame(frameId) {
      Object.values(frameEls).forEach(el => el.classList.remove("active"));
      frameEls[frameId].classList.add("active");
    }

    function fillFrame(frame) {
      const el = frameEls[frame.id];
      el.classList.remove("active");
      el.classList.add("filled");

      if (frame.type === "tri") {
        const triFills = TRI_FILLS[currentScene.name] || {};
        const fill = triFills[frame.id] || "linear-gradient(180deg,#78909c,#607d8b)";
        const outline = el.querySelector(".tri-outline");
        outline.style.background = fill;
        outline.style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";
      } else if (frame.type === "diamond") {
        const outline = el.querySelector(".diamond-outline");
        if (frame.filledCSS) outline.setAttribute("style", "width:100%;height:100%;transform:rotate(45deg);" + frame.filledCSS);
      } else if (frame.filledCSS) {
        el.setAttribute("style", frame.css + frame.filledCSS);
      }
    }

    function createShapeEl(shapeCss, color) {
      const el = document.createElement("div");
      el.className = "css-shape " + shapeCss;
      if (shapeCss === "triangle") {
        el.style.borderBottomColor = color;
      } else {
        el.style.background = color;
      }
      return el;
    }

    function pickChoices(correctName) {
      const correct = SHAPES.find(s => s.name === correctName);
      const wrong = SHAPES.filter(s => s.name !== correctName);
      const distractors = KidsGame.shuffle(wrong).slice(0, 3);
      return KidsGame.shuffle([correct, ...distractors]);
    }

    function renderChoices(correctName) {
      $shapeGrid.innerHTML = "";
      const colorPool = KidsGame.shuffle([...SHAPE_COLORS]);
      const choices = pickChoices(correctName);

      choices.forEach((shape, i) => {
        const color = colorPool[i % colorPool.length];
        const btn = document.createElement("button");
        btn.className = "shape-btn";
        btn.appendChild(createShapeEl(shape.css, color));

        const label = document.createElement("span");
        label.className = "shape-name";
        label.textContent = shape.name;
        btn.appendChild(label);

        btn.addEventListener("click", () => handleAnswer(btn, shape.name, correctName));
        $shapeGrid.appendChild(btn);
      });
    }

    function handleAnswer(btn, picked, correctName) {
      if (answered) return;
      const frame = currentScene.frames[round - 1];

      if (picked === correctName) {
        answered = true;
        stars++;
        btn.classList.add("correct");
        KidsGame.playTone(true);
        KidsGame.renderStars($stars, stars, TOTAL_ROUNDS);
        KidsGame.showFeedback("\u2B50", btn, $wrapper);
        document.querySelectorAll(".shape-btn").forEach(b => b.classList.add("disabled"));
        fillFrame(frame);
        setTimeout(() => {
          if (round < TOTAL_ROUNDS) { round++; startRound(); }
          else endGame();
        }, 1000);
      } else {
        stars = Math.max(0, stars - 1);
        btn.classList.add("wrong");
        setTimeout(() => btn.classList.add("disabled"), 400);
        KidsGame.playTone(false);
        KidsGame.renderStars($stars, stars, TOTAL_ROUNDS);
        KidsGame.showFeedback("\u274C", btn, $wrapper);
      }
    }

    function startRound() {
      answered = false;
      const frame = currentScene.frames[round - 1];
      $roundLabel.textContent = "Round " + round + " / " + TOTAL_ROUNDS;
      $prompt.textContent = frame.shape;
      $promptSub.textContent = "Find the " + frame.shape.toLowerCase() + " " + frame.hint + "!";
      KidsGame.renderStars($stars, stars, TOTAL_ROUNDS);
      activateFrame(frame.id);
      renderChoices(frame.shape);
    }

    function endGame() {
      Object.values(frameEls).forEach(el => el.classList.remove("active"));
      const msg = KidsGame.endGameMessage(stars, TOTAL_ROUNDS);
      $endTitle.textContent = msg.title;
      $endMsg.textContent = msg.message;
      KidsGame.renderFinalStars($finalStars, stars, TOTAL_ROUNDS);
      if (stars === TOTAL_ROUNDS && Math.random() < 0.5) {
        KidsGame.showReward($rewardEmoji, $rewardOv);
        setTimeout(() => { $endOv.style.display = "flex"; }, 2800);
      } else {
        $endOv.style.display = "flex";
      }
    }

    function showPicker() {
      $startOv.style.display = "none";
      $endOv.style.display = "none";
      $pickOv.style.display = "flex";

      $pickGrid.innerHTML = "";
      SCENES.forEach((scene, i) => {
        const card = document.createElement("div");
        card.className = "pick-card";
        card.innerHTML = '<span class="pick-icon">' + scene.icon + '</span><span class="pick-name">' + scene.name + '</span>';
        card.addEventListener("click", () => beginGame(i));
        $pickGrid.appendChild(card);
      });
    }

    function beginGame(sceneIndex) {
      round = 1;
      stars = 0;
      answered = false;
      $pickOv.style.display = "none";
      $endOv.style.display = "none";
      currentScene = SCENES[sceneIndex];
      $sceneTitle.textContent = currentScene.icon + " Building: " + currentScene.name;
      buildScene(currentScene);
      startRound();
    }

    // "Surprise Me!" picks a random scene
    $("pick-random-btn").addEventListener("click", () => {
      beginGame(Math.floor(Math.random() * SCENES.length));
    });

    // Start button -> show picker
    $("start-btn").addEventListener("click", showPicker);
    // Restart -> show picker again
    $("restart-btn").addEventListener("click", showPicker);

    KidsGame.renderStars($stars, 0, TOTAL_ROUNDS);
  })();
  </script>
</body>
</html>
