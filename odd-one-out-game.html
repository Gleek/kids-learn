<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odd One Out — Kids Learn</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    :root { --wrapper-width: 520px; }

    #game-area {
      padding-top: 24px;
      overflow: hidden;
    }

    #vehicle-area {
      position: relative;
      margin: 0 auto 22px;
      z-index: 1;
    }

    #vehicle-area .builder-boy {
      display: none;
    }

    #vehicle-area .builder-boy.visible {
      display: block;
    }

    .prompt-text {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-color);
      margin-bottom: 20px;
    }

    #odd-grid {
      display: grid;
      grid-template-columns: repeat(2, 112px);
      gap: 16px;
      justify-content: center;
      margin: 0 auto;
    }

    .odd-cell {
      width: 112px;
      height: 112px;
      font-size: 54px;
      border-radius: 18px;
      border: 4px solid var(--border-color);
      background: var(--bg-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }

    .odd-cell:hover {
      transform: scale(1.06);
      border-color: var(--accent);
      background: #fff0f3;
    }

    .odd-cell:active { transform: scale(0.95); }

    .odd-cell.correct {
      border-color: #4caf50;
      background: #e8f5e9;
      animation: pop 0.4s;
    }

    .odd-cell.wrong {
      border-color: var(--accent);
      background: #fce4ec;
      animation: shake 0.4s;
    }

    .odd-cell.disabled {
      pointer-events: none;
      opacity: 0.5;
    }

    @media (max-width: 420px) {
      #odd-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .odd-cell {
        width: 100%;
        height: auto;
        aspect-ratio: 1;
        font-size: 46px;
      }

      .prompt-text {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="round-label">Round 1 / 5</span>
      <div id="stars"></div>
    </div>

    <div id="game-area">
      <div id="start-screen" class="overlay">
        <h1>Odd One Out</h1>
        <p>Tap the picture that is different.</p>
        <button id="start-btn" class="btn">Play</button>
      </div>

      <div id="end-screen" class="overlay" style="display:none">
        <h1 id="end-title"></h1>
        <div id="final-stars" class="final-stars"></div>
        <p id="end-message"></p>
        <button id="restart-btn" class="btn">Play Again</button>
        <a href="index.html" class="btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;text-decoration:none;display:inline-block;text-align:center;">Home</a>
      </div>

      <div id="vehicle-area"></div>
      <div class="prompt-text">Which one is different?</div>
      <div id="odd-grid"></div>
    </div>

    <div id="reward-overlay"></div>
    <div id="reward-emoji">🎁</div>
  </div>

  <script src="shared/game.js"></script>
  <script src="shared/builder.js"></script>
  <script>
  (function () {
    const TOTAL_ROUNDS = 5;

    const GROUPS = [
      { name: "fruit", items: ["🍎", "🍌", "🍓", "🍊", "🍇", "🍉", "🍐", "🍒"] },
      { name: "vehicle", items: ["🚗", "🚌", "🚕", "🚚", "🚜", "🚲", "✈️", "🚀"] },
      { name: "animal", items: ["🐶", "🐱", "🐰", "🐸", "🐵", "🐮", "🐷", "🐔"] },
      { name: "food", items: ["🍕", "🍞", "🧀", "🥪", "🍪", "🍰", "🥨", "🥚"] },
      { name: "nature", items: ["🌳", "🌸", "🌻", "🍄", "🌵", "🍁", "🌿", "🌷"] },
      { name: "shape", items: ["🔴", "🟡", "🟢", "🔵", "🟣", "🔶", "🔷", "⭐"] },
    ];

    let round = 1;
    let stars = 0;
    let locked = false;
    let correctId = "";
    let transitionTimer = null;

    const $roundLabel = document.getElementById("round-label");
    const $stars = document.getElementById("stars");
    const $grid = document.getElementById("odd-grid");
    const $startOv = document.getElementById("start-screen");
    const $endOv = document.getElementById("end-screen");
    const $vehicleArea = document.getElementById("vehicle-area");
    const $wrapper = document.getElementById("game-wrapper");
    const $prompt = document.querySelector(".prompt-text");
    const $rewardOv = document.getElementById("reward-overlay");
    const $rewardEmoji = document.getElementById("reward-emoji");

    function makeRound() {
      const baseIndex = Math.floor(Math.random() * GROUPS.length);
      let oddIndex = Math.floor(Math.random() * GROUPS.length);
      while (oddIndex === baseIndex) oddIndex = Math.floor(Math.random() * GROUPS.length);

      const baseItems = KidsGame.pickRandom(GROUPS[baseIndex].items, 3)
        .map((emoji, index) => ({ id: "same-" + index, emoji: emoji, odd: false }));
      const oddEmoji = KidsGame.pickRandom(GROUPS[oddIndex].items, 1)[0];
      const oddItem = { id: "odd", emoji: oddEmoji, odd: true };

      return KidsGame.shuffle(baseItems.concat(oddItem));
    }

    function renderRound() {
      const cells = makeRound();
      correctId = "odd";
      locked = false;
      $grid.innerHTML = "";
      $roundLabel.textContent = "Round " + round + " / " + TOTAL_ROUNDS;
      KidsGame.renderStars($stars, stars, TOTAL_ROUNDS);

      cells.forEach(cell => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "odd-cell";
        btn.textContent = cell.emoji;
        btn.dataset.id = cell.id;
        btn.addEventListener("click", () => handlePick(btn));
        $grid.appendChild(btn);
      });
    }

    function handlePick(btn) {
      if (locked || btn.classList.contains("disabled")) return;

      if (btn.dataset.id === correctId) {
        locked = true;
        stars++;
        btn.classList.add("correct");
        KidsGame.playTone(true);
        KidsGame.renderStars($stars, stars, TOTAL_ROUNDS);
        KidsGame.showFeedback("⭐", btn, $wrapper);
        Builder.addPart();
        document.querySelectorAll(".odd-cell").forEach(cell => cell.classList.add("disabled"));

        transitionTimer = setTimeout(() => {
          if (round < TOTAL_ROUNDS) {
            round++;
            renderRound();
          } else {
            finishGame();
          }
        }, 900);
      } else {
        btn.classList.add("wrong");
        stars = Math.max(0, stars - 1);
        KidsGame.playTone(false);
        KidsGame.renderStars($stars, stars, TOTAL_ROUNDS);
        KidsGame.showFeedback("❌", btn, $wrapper);
        btn.classList.add("disabled");
      }
    }

    function finishGame() {
      $grid.style.visibility = "hidden";
      $prompt.style.visibility = "hidden";

      Builder.celebrate(() => {
        $grid.style.visibility = "";
        $prompt.style.visibility = "";
        showEndScreen();
      });
    }

    function showEndScreen() {
      KidsGame.showEndScreen({
        screenEl: $endOv,
        titleEl: document.getElementById("end-title"),
        messageEl: document.getElementById("end-message"),
        finalStarsEl: document.getElementById("final-stars"),
        earned: stars,
        total: TOTAL_ROUNDS,
        reward: { rewardEl: $rewardEmoji, overlayEl: $rewardOv },
        messages: {
          perfect: { title: "Perfect!", message: "You found every different one!" },
          good: { title: "Great Job!", message: "You built the vehicle and found the odd ones!" },
          try: { title: "Good Try!", message: "Play again to find more different ones!" },
        },
      });
    }

    function startGame() {
      clearTimeout(transitionTimer);
      round = 1;
      stars = 0;
      locked = false;
      $startOv.style.display = "none";
      $endOv.style.display = "none";
      $grid.style.visibility = "";
      $prompt.style.visibility = "";
      Builder.init($vehicleArea, "random");
      renderRound();
      KidsGame.speak("Which one is different?");
    }

    KidsGame.wireStartRestart("start-btn", "restart-btn", startGame);
    KidsGame.renderStars($stars, 0, TOTAL_ROUNDS);
    KidsGame.createMuteToggle();
  })();
  </script>
</body>
</html>
