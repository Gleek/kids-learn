<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick the Picture!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f4ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(600px, 100vw - 20px);
    text-align: center;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #ffffff;
    border-radius: 16px 16px 0 0;
    border: 3px solid #c5d3f7;
    border-bottom: none;
  }

  #round-label {
    font-size: 18px;
    color: #636e72;
    font-weight: 600;
  }

  #stars {
    display: flex;
    gap: 6px;
  }

  .star {
    font-size: 28px;
    transition: all 0.3s;
  }
  .star.earned { filter: drop-shadow(0 0 6px gold); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  #hints {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  #hints span {
    font-size: 22px;
    transition: all 0.3s;
  }
  #hints span.used {
    opacity: 0.25;
    filter: grayscale(1);
  }
  #hints.shake {
    animation: shake 0.4s ease;
  }

  #game-area {
    background: #ffffff;
    border: 3px solid #c5d3f7;
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 30px 24px 36px;
  }

  #sentence-display {
    font-size: 36px;
    font-weight: 800;
    color: #2d3436;
    line-height: 1.4;
    text-shadow: none;
    margin-bottom: 30px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  /* ── Rocket ── */
  #rocket-area {
    position: relative;
    height: 200px;
    margin: 0 auto 16px;
    width: 120px;
  }

  .rocket-part {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.5s, transform 0.5s;
    opacity: 0;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
  }

  .rocket-part.built {
    opacity: 1;
    animation: rocketPartPop 0.5s ease-out;
  }

  @keyframes rocketPartPop {
    0% { transform: translateX(-50%) scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: translateX(-50%) scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
  }

  #rp-engine { bottom: 0; width: 70px; height: 42px; }
  #rp-engine .rp-base {
    width: 70px; height: 26px;
    background: #555;
    border-radius: 0 0 8px 8px;
    margin: 0 auto;
  }
  #rp-engine .rp-nozzle {
    width: 26px; height: 16px;
    background: #333;
    border-radius: 0 0 6px 6px;
    margin: 0 auto;
  }

  #rp-lower {
    bottom: 38px; width: 60px; height: 58px;
    background: linear-gradient(135deg, var(--rocket-main), var(--rocket-dark));
    border-radius: 3px;
  }

  #rp-upper {
    bottom: 92px; width: 60px; height: 58px;
    background: linear-gradient(135deg, var(--rocket-main), var(--rocket-dark));
    border-radius: 3px;
  }

  #rp-window {
    bottom: 100px; width: 26px; height: 26px;
    background: radial-gradient(circle at 40% 35%, #a8e6ff, #4a9cc7);
    border: 3px solid #ddd;
    border-radius: 50%;
    z-index: 2;
  }

  #rp-nose {
    bottom: 146px;
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 50px solid var(--rocket-dark);
    border-radius: 3px;
  }

  #rp-lower::before, #rp-lower::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
  }
  #rp-lower::before {
    left: -15px;
    border-left: 15px solid transparent;
    border-bottom: 34px solid var(--rocket-fin);
  }
  #rp-lower::after {
    right: -15px;
    border-right: 15px solid transparent;
    border-bottom: 34px solid var(--rocket-fin);
  }

  #rp-flame {
    position: absolute;
    bottom: -65px; left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #rp-flame.active { opacity: 1; animation: rFlicker 0.15s infinite alternate; }

  @keyframes rFlicker {
    0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
    100% { transform: translateX(-50%) scaleY(1.15) scaleX(0.9); }
  }

  .rp-flame-outer {
    width: 34px; height: 58px;
    background: linear-gradient(to top, transparent, #ff6600, #ff9900);
    border-radius: 50% 50% 30% 30%;
    position: relative;
  }
  .rp-flame-inner {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 38px;
    background: linear-gradient(to top, transparent, #ffcc00, #fff);
    border-radius: 50% 50% 30% 30%;
  }

  #rocket-area.launching { animation: rLaunch 2.5s ease-in forwards; }

  @keyframes rLaunch {
    0% { transform: translateY(0); }
    10% { transform: translateY(5px); }
    100% { transform: translateY(-700px); }
  }

  #launch-msg {
    position: absolute;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    font-weight: 900;
    color: #ffd700;
    z-index: 15;
    opacity: 0;
    pointer-events: none;
  }

  #launch-msg.show { animation: launchText 2.5s forwards; }

  @keyframes launchText {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1.3); }
  }

  .smoke {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,200,200,0.6);
    pointer-events: none;
    z-index: 0;
  }

  #choices {
    display: flex;
    gap: 24px;
    justify-content: center;
  }

  .scene-card {
    width: 250px;
    height: 250px;
    border-radius: 20px;
    border: 5px solid #c5d3f7;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    background: #f0f4ff;
  }

  .scene-card:hover {
    transform: scale(1.04);
    border-color: #ff6b8a;
  }

  .scene-card:active {
    transform: scale(0.97);
  }

  .scene-card.correct {
    border-color: #4caf50;
    animation: popCard 0.5s;
  }

  .scene-card.wrong {
    border-color: #ff6b8a;
    animation: shakeCard 0.5s;
  }

  .scene-card.disabled {
    pointer-events: none;
  }

  .scene-card.dimmed {
    opacity: 0.4;
  }

  @keyframes popCard {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shakeCard {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Emoji-based scene rendering */
  .scene-canvas {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
  }

  .scene-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
  }

  .scene-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }

  .scene-emoji {
    position: relative;
    z-index: 1;
  }

  .scene-emoji.main {
    font-size: 72px;
  }

  .scene-emoji.context {
    font-size: 40px;
  }

  .scene-label {
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    z-index: 2;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(240, 244, 255, 0.97);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 10;
  }

  .overlay h1 {
    font-size: 42px;
    color: #ff6b8a;
    margin-bottom: 16px;
  }

  .overlay p {
    font-size: 22px;
    color: #2d3436;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
    padding: 0 20px;
  }

  .overlay .final-stars {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .btn {
    font-size: 28px;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    background: #ff6b8a;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .btn:hover { background: #e8527a; transform: scale(1.05); }

  .feedback-float {
    position: absolute;
    font-size: 64px;
    z-index: 15;
    animation: floatUp 0.9s forwards;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(1.5); }
  }

  /* Sentence word highlight animation */
  .word {
    display: inline-block;
    margin: 0 5px;
    animation: wordPop 0.4s ease-out both;
  }

  @keyframes wordPop {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  #reward-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 25;
    pointer-events: none;
    display: none;
  }

  #reward-overlay.active {
    display: block;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(600px) rotate(720deg) scale(0.5); }
  }

  #reward-emoji {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 100px;
    z-index: 26;
    opacity: 0;
    pointer-events: none;
  }

  #reward-emoji.active {
    animation: rewardPop 2.5s ease-out forwards;
  }

  @media (max-width: 620px) {
    #choices {
      flex-direction: column;
      align-items: center;
    }
    .scene-card {
      width: min(250px, 80vw);
      height: auto;
      aspect-ratio: 1;
    }
    #sentence-display {
      font-size: 24px;
    }
  }

  @keyframes rewardPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(-20deg); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(5deg); }
    35% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) rotate(10deg); }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="round-label">Round 1 / 5</div>
    <div id="stars"></div>
    <div id="hints"></div>
  </div>
  <div id="game-area">
    <div id="sentence-display"></div>

    <div id="rocket-area">
      <div class="rocket-part" id="rp-nose"></div>
      <div class="rocket-part" id="rp-window"></div>
      <div class="rocket-part" id="rp-upper"></div>
      <div class="rocket-part" id="rp-lower"></div>
      <div class="rocket-part" id="rp-engine">
        <div class="rp-base"></div>
        <div class="rp-nozzle"></div>
      </div>
      <div id="rp-flame">
        <div class="rp-flame-outer">
          <div class="rp-flame-inner"></div>
        </div>
      </div>
    </div>
    <div id="launch-msg">LIFTOFF!</div>

    <div id="choices"></div>
  </div>

  <div id="reward-overlay"></div>
  <div id="reward-emoji">🏆</div>

  <div class="overlay" id="start-screen">
    <h1>🖼️ Pick the Picture!</h1>
    <p>Read the sentence.<br>Tap the picture that matches!</p>
    <button class="btn" id="start-btn">GO!</button>
  </div>

  <div class="overlay" id="end-screen" style="display:none;">
    <h1 id="end-title">Great Job!</h1>
    <div class="final-stars" id="final-stars"></div>
    <p id="end-message"></p>
    <button class="btn" id="restart-btn">Play Again!</button>
    <a href="index.html" class="btn" style="background:none;border:2px solid #ff6b8a;color:#ff6b8a;margin-top:8px;text-decoration:none;display:inline-block;text-align:center;">Home</a>
  </div>
</div>

<script src="shared/data.js"></script>
<script src="shared/game.js"></script>
<script>
// ── Sentence Data (from shared/data.js) ──
const ALL_IMAGES = GameData.ALL_IMAGES;
const SENTENCES = GameData.SENTENCES;

const ROUNDS = 5;

const sentenceDisplay = document.getElementById("sentence-display");
const choicesEl = document.getElementById("choices");
const starsEl = document.getElementById("stars");
const roundLabel = document.getElementById("round-label");
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const wrapper = document.getElementById("game-wrapper");

const TOTAL_HINTS = 3;
const hintsEl = document.getElementById("hints");

let currentRound = 0;
let starsEarned = 0;
let hintsLeft = TOTAL_HINTS;
let sessionSentences = [];
let locked = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(success) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;
  if (success) {
    osc.frequency.value = 523; osc.type = "sine";
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  } else {
    osc.frequency.value = 200; osc.type = "square";
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }
}

// ── Rocket ──
const ROCKET_PARTS = ["rp-engine", "rp-lower", "rp-upper", "rp-window", "rp-nose"];
const rocketArea = document.getElementById("rocket-area");
const rocketFlame = document.getElementById("rp-flame");
const launchMsg = document.getElementById("launch-msg");
let partsBuilt = 0;

const ROCKET_COLORS = [
  { main: "#ff6b8a", dark: "#e8527a", fin: "#b52e45" },
  { main: "#4a90d9", dark: "#2e6bb5", fin: "#245a9e" },
  { main: "#45c945", dark: "#2ea82e", fin: "#238f23" },
  { main: "#f5a623", dark: "#d4891a", fin: "#b87315" },
  { main: "#a855f7", dark: "#8b3fd9", fin: "#7630bc" },
  { main: "#f472b6", dark: "#d94f9a", fin: "#c03d84" },
  { main: "#facc15", dark: "#d4a90e", fin: "#b8920a" },
  { main: "#22d3ee", dark: "#18a8be", fin: "#1290a3" },
];

function resetRocket() {
  partsBuilt = 0;
  for (var i = 0; i < ROCKET_PARTS.length; i++) {
    document.getElementById(ROCKET_PARTS[i]).classList.remove("built");
  }
  rocketFlame.classList.remove("active");
  rocketArea.classList.remove("launching");
  launchMsg.classList.remove("show");
  var color = ROCKET_COLORS[Math.floor(Math.random() * ROCKET_COLORS.length)];
  rocketArea.style.setProperty("--rocket-main", color.main);
  rocketArea.style.setProperty("--rocket-dark", color.dark);
  rocketArea.style.setProperty("--rocket-fin", color.fin);
}

function addRocketPart() {
  if (partsBuilt < ROCKET_PARTS.length) {
    document.getElementById(ROCKET_PARTS[partsBuilt]).classList.add("built");
    partsBuilt++;
  }
}

function playLaunchSound() {
  var noise = audioCtx.createOscillator();
  var noiseGain = audioCtx.createGain();
  noise.type = "sawtooth";
  noise.frequency.value = 80;
  noise.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  noiseGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
  noise.start();
  noise.stop(audioCtx.currentTime + 2.5);
}

function spawnSmoke() {
  var gameArea = document.getElementById("game-area");
  var rRect = rocketArea.getBoundingClientRect();
  var aRect = gameArea.getBoundingClientRect();
  var baseX = rRect.left - aRect.left + rRect.width / 2;
  var baseY = rRect.top - aRect.top + rRect.height;
  var count = 0;
  var interval = setInterval(function () {
    if (count > 15) { clearInterval(interval); return; }
    var smoke = document.createElement("div");
    smoke.className = "smoke";
    var size = 12 + Math.random() * 25;
    smoke.style.width = size + "px";
    smoke.style.height = size + "px";
    smoke.style.left = (baseX - size / 2 + (Math.random() - 0.5) * 50) + "px";
    smoke.style.top = (baseY - size / 2) + "px";
    smoke.style.transition = "all 1.5s ease-out";
    gameArea.appendChild(smoke);
    requestAnimationFrame(function () {
      smoke.style.top = (baseY + 40 + Math.random() * 60) + "px";
      smoke.style.left = (baseX - size / 2 + (Math.random() - 0.5) * 120) + "px";
      smoke.style.opacity = "0";
      smoke.style.transform = "scale(" + (1.5 + Math.random()) + ")";
    });
    setTimeout(function () { smoke.remove(); }, 1600);
    count++;
  }, 100);
}

function launchRocket(callback) {
  sentenceDisplay.style.visibility = "hidden";
  choicesEl.style.visibility = "hidden";

  rocketFlame.classList.add("active");
  playLaunchSound();
  spawnSmoke();

  setTimeout(function () {
    rocketArea.classList.add("launching");
    launchMsg.classList.add("show");
  }, 600);

  setTimeout(function () {
    callback();
  }, 3500);
}

function renderStars() {
  starsEl.innerHTML = "";
  for (let i = 0; i < ROUNDS; i++) {
    const span = document.createElement("span");
    span.className = "star" + (i < starsEarned ? " earned" : "");
    span.textContent = i < starsEarned ? "⭐" : "☆";
    span.style.color = i < starsEarned ? "gold" : "#555";
    starsEl.appendChild(span);
  }
}

function renderHints() {
  hintsEl.innerHTML = "";
  for (let i = 0; i < TOTAL_HINTS; i++) {
    const span = document.createElement("span");
    span.textContent = "💬";
    if (i >= hintsLeft) span.className = "used";
    hintsEl.appendChild(span);
  }
}

function pickSession() {
  const shuffled = [...SENTENCES].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, ROUNDS);
}

function animateSentence(text) {
  sentenceDisplay.innerHTML = "";
  const words = text.split(" ");
  words.forEach((word, i) => {
    const span = document.createElement("span");
    span.className = "word";
    span.textContent = word;
    span.style.animationDelay = (i * 0.12) + "s";
    // Tap a word to hear its phonics
    const clean = word.replace(/[^a-zA-Z]/g, "");
    if (clean) {
      span.style.cursor = "pointer";
      span.addEventListener("click", (e) => {
        e.stopPropagation();
        if (hintsLeft > 0) {
          hintsLeft--;
          renderHints();
          sentenceDisplay.querySelectorAll(".word").forEach(w => w.style.color = "");
          span.style.color = "#ffd700";
          KidsGame.speakWord(clean, () => {
            span.style.color = "";
          });
        } else {
          hintsEl.classList.remove("shake");
          void hintsEl.offsetWidth;
          hintsEl.classList.add("shake");
        }
      });
    }
    sentenceDisplay.appendChild(span);
  });
}

function buildScene(imgSrc) {
  const card = document.createElement("div");
  card.className = "scene-card";

  const img = document.createElement("img");
  img.src = imgSrc;
  img.alt = "";
  img.draggable = false;
  card.appendChild(img);

  return card;
}

function setupRound() {
  const data = sessionSentences[currentRound];
  roundLabel.textContent = `Round ${currentRound + 1} / ${ROUNDS}`;
  animateSentence(data.sentence);

  choicesEl.innerHTML = "";
  locked = false;

  // Pick a random wrong image from the pool
  const wrongPool = ALL_IMAGES.filter(img => img !== data.correct);
  const wrongImg = wrongPool[Math.floor(Math.random() * wrongPool.length)];

  // Randomize left/right placement
  const scenes = [
    { img: data.correct, isCorrect: true },
    { img: wrongImg, isCorrect: false },
  ].sort(() => Math.random() - 0.5);

  for (const scene of scenes) {
    const card = buildScene(scene.img);
    card.addEventListener("click", () => handlePick(card, scene.isCorrect));
    choicesEl.appendChild(card);
  }
}

function handlePick(card, isCorrect) {
  if (locked) return;
  locked = true;

  const allCards = document.querySelectorAll(".scene-card");

  if (isCorrect) {
    card.classList.add("correct");
    starsEarned = Math.min(ROUNDS, starsEarned + 1);
    playTone(true);
    showFeedback("⭐", card);
    addRocketPart();

    allCards.forEach(c => {
      c.classList.add("disabled");
      if (c !== card) c.classList.add("dimmed");
    });

    renderStars();

    setTimeout(() => {
      currentRound++;
      if (currentRound >= ROUNDS) {
        endGame();
      } else {
        setupRound();
      }
    }, 1200);
  } else {
    card.classList.add("wrong");
    starsEarned = Math.max(0, starsEarned - 1);
    playTone(false);
    showFeedback("❌", card);
    renderStars();

    // Let them try again after a brief pause
    setTimeout(() => {
      card.classList.add("disabled", "dimmed");
      locked = false;
    }, 600);
  }
}

function showFeedback(emoji, el) {
  const rect = el.getBoundingClientRect();
  const wrapRect = wrapper.getBoundingClientRect();
  const fb = document.createElement("div");
  fb.className = "feedback-float";
  fb.textContent = emoji;
  fb.style.left = (rect.left - wrapRect.left + rect.width / 2 - 20) + "px";
  fb.style.top = (rect.top - wrapRect.top - 10) + "px";
  wrapper.appendChild(fb);
  setTimeout(() => fb.remove(), 900);
}

function playRewardChime() {
  const notes = [523, 659, 784, 880, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.12;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
    osc.start(t);
    osc.stop(t + 0.5);
  });
}

function spawnConfetti() {
  const overlay = document.getElementById("reward-overlay");
  overlay.innerHTML = "";
  overlay.classList.add("active");

  const colors = ["#ff6b8a", "#ffd700", "#4caf50", "#4a90d9", "#a855f7", "#ff6b6b", "#22d3ee", "#f472b6"];

  for (let i = 0; i < 60; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti";
    piece.style.left = Math.random() * 100 + "%";
    piece.style.top = -10 + "px";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + "px";
    piece.style.height = (6 + Math.random() * 8) + "px";
    piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    piece.style.animationDuration = (1.5 + Math.random() * 2) + "s";
    piece.style.animationDelay = (Math.random() * 0.8) + "s";
    overlay.appendChild(piece);
  }

  setTimeout(() => {
    overlay.classList.remove("active");
    overlay.innerHTML = "";
  }, 4000);
}

function showReward() {
  const emojis = ["🏆", "🎉", "👑", "🦄", "🌈", "🎊"];
  const rewardEl = document.getElementById("reward-emoji");
  rewardEl.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  rewardEl.classList.remove("active");
  void rewardEl.offsetWidth;
  rewardEl.classList.add("active");
  spawnConfetti();
  playRewardChime();
}

function endGame() {
  // Launch rocket first, then show end screen
  launchRocket(function () {
    sentenceDisplay.style.visibility = "visible";
    choicesEl.style.visibility = "visible";

    const showRewardNow = starsEarned === ROUNDS && Math.random() < 0.5;
    if (showRewardNow) {
      showReward();
      setTimeout(() => { endScreen.style.display = "flex"; }, 2800);
    } else {
      endScreen.style.display = "flex";
    }
  });

  const finalStars = document.getElementById("final-stars");
  finalStars.textContent = "";
  for (let i = 0; i < ROUNDS; i++) {
    finalStars.textContent += i < starsEarned ? "⭐" : "☆";
  }
  const title = document.getElementById("end-title");
  const msg = document.getElementById("end-message");
  if (starsEarned === ROUNDS) {
    title.textContent = "Perfect!";
    msg.textContent = "You matched every sentence!";
  } else if (starsEarned >= 3) {
    title.textContent = "Great Job!";
    msg.textContent = "Keep reading and playing!";
  } else {
    title.textContent = "Good Try!";
    msg.textContent = "Play again to get more stars!";
  }
}

function startGame() {
  startScreen.style.display = "none";
  endScreen.style.display = "none";
  starsEarned = 0;
  hintsLeft = TOTAL_HINTS;
  currentRound = 0;
  sessionSentences = pickSession();
  resetRocket();
  renderStars();
  renderHints();
  setupRound();
}

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("restart-btn").addEventListener("click", startGame);

KidsGame.createMuteToggle();
resetRocket();
renderStars();
renderHints();
</script>
