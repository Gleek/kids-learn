<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVC Word Car Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
    padding: 10px 0;
  }

  #game-wrapper {
    position: relative;
    width: min(480px, 100vw - 20px);
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: #16213e;
    border-radius: 16px 16px 0 0;
    border: 3px solid #0f3460;
    border-bottom: none;
  }

  #word-display {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 12px;
    text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
  }

  #stars {
    display: flex;
    gap: 6px;
  }

  .star {
    font-size: 32px;
    transition: all 0.3s;
  }

  .star.earned {
    filter: drop-shadow(0 0 6px gold);
  }

  .star.lost {
    animation: shake 0.4s;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px) rotate(-10deg); }
    75% { transform: translateX(4px) rotate(10deg); }
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    border: 3px solid #0f3460;
    border-top: none;
    border-radius: 0 0 16px 16px;
    background: #4a7c59;
  }

  #start-screen, #end-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(22, 33, 62, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 10;
  }

  #start-screen h1, #end-screen h1 {
    font-size: 42px;
    color: #e94560;
    margin-bottom: 16px;
    text-align: center;
  }

  #start-screen p, #end-screen p {
    font-size: 22px;
    color: #eee;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
  }

  #end-screen .final-stars {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .btn {
    font-size: 28px;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    background: #e94560;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .btn:hover { background: #c73652; transform: scale(1.05); }

  #mobile-controls {
    display: none;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
  }

  .mobile-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #0f3460;
    background: #16213e;
    color: #fff;
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .mobile-btn:active { background: #0f3460; }

  @media (pointer: coarse) {
    #mobile-controls { display: flex; }
  }

  @media (max-width: 500px) {
    #word-display { font-size: 32px; letter-spacing: 8px; }
    .star { font-size: 24px; }
    .mobile-btn { width: 60px; height: 60px; font-size: 28px; }
  }

  .feedback {
    position: absolute;
    font-size: 64px;
    z-index: 5;
    animation: floatUp 1s forwards;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="word-display">CAT</div>
    <div id="stars"></div>
  </div>
  <canvas id="game" width="480" height="640"></canvas>

  <div id="start-screen">
    <h1>🚗 Word Drive!</h1>
    <p>Read the word at the top.<br>Drive into the matching picture!<br>⬅️ ➡️ Arrow keys to move.</p>
    <button class="btn" id="start-btn">GO!</button>
  </div>

  <div id="end-screen" style="display:none;">
    <h1>Great Job!</h1>
    <div class="final-stars" id="final-stars"></div>
    <p id="end-message"></p>
    <button class="btn" id="restart-btn">Play Again!</button>
  </div>

  <div id="mobile-controls">
    <button class="mobile-btn" id="left-btn">⬅️</button>
    <button class="mobile-btn" id="right-btn">➡️</button>
  </div>
</div>

<script src="shared/data.js"></script>
<script>
// ── CVC Words & Emoji Mappings ──
const CVC_WORDS = GameData.CVC_WORDS;

const WORDS_PER_SESSION = 5;
const LANE_COUNT = 4;

// ── Canvas Setup ──
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;
const LANE_W = W / LANE_COUNT;

// ── Game State ──
let gameRunning = false;
let car = { lane: 1, width: 50, height: 70 };
let objects = [];
let currentRound = 0;
let starsEarned = 0;
let sessionWords = [];
let currentWord = null;
let spawnReady = false;
let objectSpeed = 1.5;
let roadLineOffset = 0;
let feedbacks = [];
let roundActive = false;
let roundCooldown = 0;

// ── DOM Elements ──
const wordDisplay = document.getElementById("word-display");
const starsEl = document.getElementById("stars");
const startScreen = document.getElementById("start-screen");
const endScreen = document.getElementById("end-screen");
const wrapper = document.getElementById("game-wrapper");

// ── Stars Rendering ──
function renderStars() {
  starsEl.innerHTML = "";
  for (let i = 0; i < WORDS_PER_SESSION; i++) {
    const span = document.createElement("span");
    span.className = "star" + (i < starsEarned ? " earned" : "");
    span.textContent = i < starsEarned ? "⭐" : "☆";
    span.style.color = i < starsEarned ? "gold" : "#555";
    starsEl.appendChild(span);
  }
}

// ── Pick Session Words ──
function pickSessionWords() {
  const shuffled = [...CVC_WORDS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, WORDS_PER_SESSION);
}

// ── Spawn Objects for Current Word ──
function spawnObjects() {
  objects = [];
  if (!currentWord) return;

  const lanes = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
  const correctLane = lanes[0];

  // Place correct emoji
  objects.push({
    emoji: currentWord.emoji,
    lane: correctLane,
    y: -80,
    correct: true,
    size: 50,
  });

  // Place distractors
  for (let i = 0; i < 3; i++) {
    objects.push({
      emoji: currentWord.distractors[i],
      lane: lanes[i + 1],
      y: -80,
      correct: false,
      size: 50,
    });
  }

  roundActive = true;
}

// ── Car Drawing ──
function drawCar() {
  const x = car.lane * LANE_W + LANE_W / 2;
  const y = H - 100;
  const w = car.width;
  const h = car.height;

  // Car body
  ctx.fillStyle = "#e94560";
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y - h / 2, w, h, 10);
  ctx.fill();

  // Windshield
  ctx.fillStyle = "#7ec8e3";
  ctx.beginPath();
  ctx.roundRect(x - w / 2 + 8, y - h / 2 + 8, w - 16, 18, 5);
  ctx.fill();

  // Wheels
  ctx.fillStyle = "#222";
  ctx.fillRect(x - w / 2 - 5, y - h / 2 + 5, 8, 16);
  ctx.fillRect(x + w / 2 - 3, y - h / 2 + 5, 8, 16);
  ctx.fillRect(x - w / 2 - 5, y + h / 2 - 21, 8, 16);
  ctx.fillRect(x + w / 2 - 3, y + h / 2 - 21, 8, 16);

  // Headlights
  ctx.fillStyle = "#ffd700";
  ctx.beginPath();
  ctx.arc(x - w / 2 + 10, y - h / 2 + 2, 4, 0, Math.PI * 2);
  ctx.arc(x + w / 2 - 10, y - h / 2 + 2, 4, 0, Math.PI * 2);
  ctx.fill();
}

// ── Road Drawing ──
function drawRoad() {
  // Road surface
  ctx.fillStyle = "#555";
  ctx.fillRect(0, 0, W, H);

  // Lane dividers (dashed)
  roadLineOffset = (roadLineOffset + objectSpeed) % 40;
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 3;
  ctx.setLineDash([20, 20]);
  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.beginPath();
    ctx.lineDashOffset = -roadLineOffset;
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Road edges
  ctx.fillStyle = "#e94560";
  ctx.fillRect(0, 0, 6, H);
  ctx.fillRect(W - 6, 0, 6, H);
}

// ── Object Drawing ──
function drawObjects() {
  for (const obj of objects) {
    const x = obj.lane * LANE_W + LANE_W / 2;
    ctx.font = `${obj.size}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(obj.emoji, x, obj.y);
  }
}

// ── Collision Detection ──
function checkCollisions() {
  const carX = car.lane * LANE_W + LANE_W / 2;
  const carY = H - 100;

  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    const objX = obj.lane * LANE_W + LANE_W / 2;

    const dx = Math.abs(carX - objX);
    const dy = Math.abs(carY - obj.y);

    if (dx < 45 && dy < 45) {
      if (obj.correct) {
        starsEarned = Math.min(WORDS_PER_SESSION, starsEarned + 1);
        showFeedback("⭐", carX, carY - 60);
        playTone(true);
      } else {
        starsEarned = Math.max(0, starsEarned - 1);
        showFeedback("❌", carX, carY - 60);
        playTone(false);
      }
      renderStars();
      objects = [];
      roundActive = false;
      roundCooldown = 60; // ~1 second pause before next word
      return;
    }
  }
}

// ── Feedback Popup ──
function showFeedback(emoji, x, y) {
  const el = document.createElement("div");
  el.className = "feedback";
  el.textContent = emoji;
  el.style.left = (x + canvas.offsetLeft) + "px";
  el.style.top = (y + canvas.offsetTop + 60) + "px";
  wrapper.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ── Simple Audio Feedback ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(success) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;

  if (success) {
    osc.frequency.value = 523;
    osc.type = "sine";
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  } else {
    osc.frequency.value = 200;
    osc.type = "square";
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }
}

// ── Next Round ──
function nextRound() {
  currentRound++;
  if (currentRound > WORDS_PER_SESSION) {
    endGame();
    return;
  }
  currentWord = sessionWords[currentRound - 1];
  wordDisplay.textContent = currentWord.word;
  spawnObjects();
}

// ── End Game ──
function endGame() {
  gameRunning = false;
  endScreen.style.display = "flex";
  const finalStars = document.getElementById("final-stars");
  finalStars.textContent = "";
  for (let i = 0; i < WORDS_PER_SESSION; i++) {
    finalStars.textContent += i < starsEarned ? "⭐" : "☆";
  }
  const msg = document.getElementById("end-message");
  if (starsEarned === WORDS_PER_SESSION) {
    msg.textContent = "Perfect! You got all the stars!";
  } else if (starsEarned >= 3) {
    msg.textContent = "Great driving! Keep it up!";
  } else {
    msg.textContent = "Good try! Play again to get more stars!";
  }
}

// ── Main Game Loop ──
function gameLoop() {
  if (!gameRunning) return;

  drawRoad();
  drawCar();

  if (roundActive) {
    // Move objects down
    for (const obj of objects) {
      obj.y += objectSpeed;
    }

    drawObjects();
    checkCollisions();

    // If objects pass the screen, treat as a miss — move to next round
    const allPassed = objects.length > 0 && objects.every(o => o.y > H + 50);
    if (allPassed) {
      objects = [];
      roundActive = false;
      roundCooldown = 40;
    }
  } else {
    if (roundCooldown > 0) {
      roundCooldown--;
    } else {
      nextRound();
    }
  }

  requestAnimationFrame(gameLoop);
}

// ── Input Handling ──
function moveCar(direction) {
  if (!gameRunning) return;
  if (direction === "left" && car.lane > 0) car.lane--;
  if (direction === "right" && car.lane < LANE_COUNT - 1) car.lane++;
}

function moveCarToLane(lane) {
  if (!gameRunning) return;
  if (lane >= 0 && lane < LANE_COUNT) car.lane = lane;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") { e.preventDefault(); moveCar("left"); }
  if (e.key === "ArrowRight") { e.preventDefault(); moveCar("right"); }
});

// Tap on canvas to move car to that lane
canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  moveCarToLane(Math.floor(x / LANE_W));
});

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = (touch.clientX - rect.left) * (W / rect.width);
  moveCarToLane(Math.floor(x / LANE_W));
});

// Mobile arrow controls (kept as fallback)
document.getElementById("left-btn").addEventListener("touchstart", (e) => { e.preventDefault(); moveCar("left"); });
document.getElementById("right-btn").addEventListener("touchstart", (e) => { e.preventDefault(); moveCar("right"); });
document.getElementById("left-btn").addEventListener("click", () => moveCar("left"));
document.getElementById("right-btn").addEventListener("click", () => moveCar("right"));

// ── Start / Restart ──
function startGame() {
  startScreen.style.display = "none";
  endScreen.style.display = "none";
  starsEarned = 0;
  currentRound = 0;
  objects = [];
  roundActive = false;
  roundCooldown = 30;
  car.lane = 1;
  sessionWords = pickSessionWords();
  renderStars();
  gameRunning = true;
  gameLoop();
}

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("restart-btn").addEventListener("click", startGame);

// Initial stars
renderStars();
</script>

</body>
</html>
